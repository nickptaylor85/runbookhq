<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunbookHQ</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg0:#060a14;--bg1:#0b1020;--bg2:#10162e;--bg2h:#151d3a;--bg3:#192244;
--brd:#1a2650;--brdh:#283a6e;
--t1:#e8ecf6;--t2:#8892b0;--t3:#4a5578;--t4:#2d3756;
--ac:#4f6cf7;--acg:#4f6cf740;--acs:#4f6cf720;--acl:#6b84ff;
--red:#ef4444;--reds:#ef444418;--amb:#f59e0b;--ambs:#f59e0b18;
--grn:#22c55e;--grns:#22c55e18;--pnk:#ec4899;--pnks:#ec489918;
--vio:#8b5cf6;--vios:#8b5cf618;--blu:#3b82f6;--blus:#3b82f618;
--r:10px;--rl:14px;
--fs:'Outfit',system-ui,sans-serif;--fm:'IBM Plex Mono',monospace;
--glass:rgba(16,22,46,.7);
--sb-width:250px;
}
[data-theme="light"]{
--bg0:#f4f6fb;--bg1:#ffffff;--bg2:#eef1f8;--bg2h:#e4e8f4;--bg3:#d8ddef;
--brd:#d0d5e4;--brdh:#b8bfd4;
--t1:#1a1f36;--t2:#4a5068;--t3:#7a8098;--t4:#b0b5c8;
--ac:#4f6cf7;--acg:#4f6cf730;--acs:#4f6cf712;--acl:#3b5ae0;
--red:#dc2626;--reds:#dc262610;--amb:#d97706;--ambs:#d9770610;
--grn:#16a34a;--grns:#16a34a10;--pnk:#db2777;--pnks:#db277710;
--vio:#7c3aed;--vios:#7c3aed10;--blu:#2563eb;--blus:#2563eb10;
--glass:rgba(255,255,255,.85);
}
html{font-size:15px;scroll-behavior:smooth}
[data-theme="light"] body::before,[data-theme="light"] body::after,[data-theme="light"] main::before,[data-theme="light"] main::after{display:none}
[data-theme="light"] .sb-brand .ic{box-shadow:0 2px 8px rgba(79,108,247,.2)}
[data-theme="light"] .ni.act{color:#3b5ae0}
[data-theme="light"] .badge-ai{background:#dbeafe;color:#2563eb;border-color:#93c5fd40}
[data-theme="light"] .badge-infosec{background:#fee2e2;color:#dc2626;border-color:#fca5a540}
[data-theme="light"] .badge-draft{background:#e0e7ff;color:#4338ca;border-color:#a5b4fc40}
[data-theme="light"] .badge-review{background:#fef3c7;color:#92400e;border-color:#fcd34d40}
[data-theme="light"] .badge-approved{background:#dcfce7;color:#166534;border-color:#86efac40}
[data-theme="light"] .badge-critical{background:#fee2e2;color:#dc2626;border-color:#fca5a540}
[data-theme="light"] .badge-high{background:#ffedd5;color:#c2410c;border-color:#fdba7440}
[data-theme="light"] .badge-medium{background:#fef3c7;color:#92400e;border-color:#fcd34d40}
[data-theme="light"] .badge-low{background:#dcfce7;color:#166534;border-color:#86efac40}
[data-theme="light"] .ar-role{background:#e0e7ff;color:#3b5ae0;border-color:#a5b4fc30}
[data-theme="light"] .ar-tool{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd30}
[data-theme="light"] .ar-is{background:#fee2e2;color:#dc2626;border-color:#fca5a530}
[data-theme="light"] .isb{background:#fef2f2;border-color:#fecaca}
[data-theme="light"] .ist{color:#dc2626}
[data-theme="light"] .isi .isd{background:#dc2626}
[data-theme="light"] .confirm-overlay{background:rgba(0,0,0,.3)}
[data-theme="light"] .confirm-box{background:#fff;border-color:#d0d5e4}
[data-theme="light"] .guide-tip{background:#eef2ff;color:#4338ca;border-color:#c7d2fe}
[data-theme="light"] .tc{background:#eef2ff;border-color:#c7d2fe40}
[data-theme="light"] .tc b{color:#1a1f36}
[data-theme="light"] .nt{background:#e0e7ff;color:#4338ca;border-color:#a5b4fc40}
[data-theme="light"] .nt.off{background:#f1f5f9;color:#94a3b8;border-color:#cbd5e140}
[data-theme="light"] .dot-on{background:#dcfce7;color:#16a34a;border-color:#86efac}
[data-theme="light"] .dot-warn{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
[data-theme="light"] .pbar{background:#e0e7ff}
[data-theme="light"] .toast{background:#1a1f36;color:#f4f6fb}
[data-theme="light"] .sb-ft .vl{color:#4f6cf7}
[data-theme="light"] .theme-toggle svg{stroke:var(--t2)}
[data-theme="light"] .ni.act{color:#3b5ae0;background:#e0e7ff;border-color:#a5b4fc30}
[data-theme="light"] .ni.act::before{background:linear-gradient(180deg,#4f6cf7,#7c3aed)}
[data-theme="light"] .nt-0{background:#e0e7ff;color:#4338ca;border-color:#a5b4fc30}
[data-theme="light"] .nt-1{background:#fef3c7;color:#92400e;border-color:#fcd34d30}
[data-theme="light"] .nt-2{background:#fee2e2;color:#dc2626;border-color:#fca5a530}
[data-theme="light"] .nt-3{background:#fce7f3;color:#be185d;border-color:#f9a8d430}
[data-theme="light"] .nt-4{background:#dcfce7;color:#166534;border-color:#86efac30}
[data-theme="light"] .nt-5{background:#f3e8ff;color:#6b21a8;border-color:#c4b5fd30}
[data-theme="light"] .badge-ai{background:#e0e7ff;color:#4338ca;border-color:#a5b4fc30}
[data-theme="light"] .genb{box-shadow:0 4px 15px rgba(79,108,247,.2)}
[data-theme="light"] .inp:focus{box-shadow:0 0 0 3px rgba(79,108,247,.12)}
[data-theme="light"] .guide-tip{background:#eef2ff;color:#4338ca;border-color:#c7d2fe}
[data-theme="light"] .mo .md{background:#fff;border-color:#d0d5e4;box-shadow:0 24px 80px rgba(0,0,0,.12)}
[data-theme="light"] .export-menu{background:#fff;border-color:#d0d5e4;box-shadow:0 12px 40px rgba(0,0,0,.1)}
.badge-fw{font-size:.5rem;padding:1px 6px;background:var(--vios);color:#c4b5fd;border:1px solid #8b5cf620;border-radius:14px;font-weight:600;text-transform:uppercase;letter-spacing:.2px}
[data-theme="light"] .badge-fw{background:#f3e8ff;color:#6b21a8;border-color:#c4b5fd30}
body{font-family:var(--fs);background:var(--bg0);color:var(--t1);height:100vh;overflow:hidden;display:flex}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:9px}::-webkit-scrollbar-thumb:hover{background:var(--brdh)}

/* ===== SIDEBAR ===== */
.sb{width:var(--sb-width);background:var(--bg1);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s cubic-bezier(.4,0,.2,1),transform .25s cubic-bezier(.4,0,.2,1);position:relative;z-index:10}
.sb.collapsed{width:56px}
.sb.collapsed .sb-brand h1,.sb.collapsed .sb-brand p,.sb.collapsed .ni span,.sb.collapsed .sb-ft .lb,.sb.collapsed .sb-ft .vl{opacity:0;width:0;overflow:hidden;white-space:nowrap}
.sb.collapsed .sb-brand{padding:18px 11px;gap:0;justify-content:center}
.sb.collapsed .ni{padding:8px;justify-content:center}
.sb.collapsed .ni.act::before{left:-11px}
.sb-toggle{position:absolute;top:18px;right:-12px;width:24px;height:24px;background:var(--bg2);border:1px solid var(--brd);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:11;transition:all .2s}
.sb-toggle:hover{background:var(--ac);border-color:var(--ac)}
.sb-toggle:hover svg{stroke:#fff}
.sb-toggle svg{transition:transform .25s}
.sb.collapsed .sb-toggle svg{transform:rotate(180deg)}
.sb-brand{padding:18px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;transition:all .25s}
.sb-brand .ic{width:34px;height:34px;background:linear-gradient(135deg,var(--ac),#7c5cf6);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 12px var(--acg)}
.sb-brand .ic svg{stroke:#fff;width:18px;height:18px}
.sb-brand h1{font-size:.85rem;font-weight:700;line-height:1.2;transition:opacity .15s}
.sb-brand p{font-family:var(--fm);font-size:.55rem;color:var(--t3);letter-spacing:.5px;transition:opacity .15s}
.theme-toggle{margin-left:auto;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;border:1px solid transparent}
.theme-toggle:hover{background:var(--bg2);border-color:var(--brd)}
.sb.collapsed .theme-toggle{display:none}
.sb nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px;overflow:hidden}
.ni{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);font-size:.75rem;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;border:1px solid transparent;position:relative}
.ni:hover{background:var(--bg2);color:var(--t1)}
.ni.act{background:var(--acs);color:#a5b4fc;border-color:#4f6cf725}
.ni.act::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:14px;background:linear-gradient(180deg,var(--ac),#8b5cf6);border-radius:0 3px 3px 0}
.ni svg{width:15px;height:15px;flex-shrink:0}
.ni span{transition:opacity .15s}
.sb-ft{padding:10px;border-top:1px solid var(--brd);overflow:hidden}
.ni[onclick*="showGuide"]{margin-top:auto;border-top:1px solid var(--brd);padding-top:8px}

/* Guide modal */
.guide-content{max-height:65vh;overflow-y:auto;padding-right:4px}
.guide-content::-webkit-scrollbar{width:4px}
.guide-content::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}
.guide-section{margin-bottom:16px}
.guide-section h3{font-size:.82rem;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;color:var(--t1)}
.guide-section p{font-size:.72rem;color:var(--t2);line-height:1.6;margin-bottom:4px}
.guide-step{display:flex;gap:8px;padding:6px 0;align-items:flex-start}
.guide-num{width:20px;height:20px;border-radius:50%;background:var(--acs);color:var(--ac);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0;margin-top:1px}
.guide-step-text{font-size:.72rem;color:var(--t2);line-height:1.5}
.guide-step-text b{color:var(--t1);font-weight:600}
.guide-tip{padding:8px 10px;background:var(--acs);border:1px solid #4f6cf718;border-radius:var(--r);font-size:.68rem;color:#a5b4fc;margin:6px 0;line-height:1.5;display:flex;gap:6px;align-items:flex-start}
.guide-tip svg{flex-shrink:0;margin-top:1px}
.guide-kbd{display:inline-flex;padding:1px 5px;background:var(--bg1);border:1px solid var(--brd);border-radius:4px;font-family:var(--fm);font-size:.55rem;color:var(--t3);vertical-align:middle;margin:0 1px}
.sb-ft .card{padding:10px}
.sb-ft .lb{font-family:var(--fm);font-size:.52rem;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;transition:opacity .15s}
.sb-ft .vl{font-size:.72rem;font-weight:600;color:#a5b4fc;margin-top:1px;transition:opacity .15s}

/* ===== MAIN ===== */
main{flex:1;overflow-y:auto;padding:24px 32px;position:relative}
main::before{content:'';position:fixed;top:-120px;right:-120px;width:500px;height:500px;background:radial-gradient(circle,#4f6cf718 0%,transparent 70%);pointer-events:none}
main::after{content:'';position:fixed;bottom:-200px;left:-100px;width:400px;height:400px;background:radial-gradient(circle,#8b5cf610 0%,transparent 70%);pointer-events:none}
.page{display:none;position:relative;z-index:1;animation:fi .25s cubic-bezier(.4,0,.2,1);max-width:1080px}
.page.vis{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeScale{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

h1.pt{font-size:1.4rem;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:9px}
.ps{font-size:.78rem;color:var(--t2);margin-bottom:20px}

.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);transition:all .2s}
.card:hover{border-color:var(--brdh)}

.badge{display:inline-flex;padding:2px 7px;font-size:.55rem;font-weight:600;border-radius:16px;border:1px solid;text-transform:uppercase;letter-spacing:.2px}
.badge-draft{background:var(--ambs);color:var(--amb);border-color:#f59e0b25}
.badge-review{background:var(--blus);color:var(--blu);border-color:#3b82f625}
.badge-approved{background:var(--grns);color:var(--grn);border-color:#22c55e25}
.badge-infosec{background:var(--reds);color:var(--red);border-color:#ef444425}
.badge-low{background:var(--grns);color:var(--grn);border-color:#22c55e25}
.badge-medium{background:var(--ambs);color:var(--amb);border-color:#f59e0b25}
.badge-high{background:var(--reds);color:var(--red);border-color:#ef444425}
.badge-critical{background:#dc262620;color:#fca5a5;border-color:#dc262640}
.badge-ai{background:var(--acs);color:#a5b4fc;border-color:#4f6cf725}

.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:.72rem;font-weight:600;border-radius:var(--r);cursor:pointer;transition:all .2s;border:1px solid transparent;font-family:var(--fs)}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{background:#5f7af8;box-shadow:0 4px 20px var(--acg);transform:translateY(-1px)}
.btn-s{background:var(--bg3);color:var(--t2);border-color:var(--brd)}.btn-s:hover{background:var(--bg2h);color:var(--t1)}
.btn-d{background:var(--reds);color:var(--red);border-color:#ef444425}
.btn-g{background:transparent;color:var(--t3);padding:3px 6px;border:none;cursor:pointer;border-radius:6px;transition:all .15s}.btn-g:hover{color:var(--t1);background:var(--bg3)}
.btn-sm{padding:4px 9px;font-size:.65rem}

.inp{width:100%;padding:8px 12px;background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r);color:var(--t1);font-size:.75rem;font-family:var(--fs);transition:all .2s;outline:none}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px #4f6cf718}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;min-height:70px;line-height:1.5}
.lbl{font-family:var(--fm);font-size:.53rem;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:3px;display:block}

/* Phase tags */
.nt{display:inline-flex;padding:2px 7px;font-size:.55rem;font-weight:600;border-radius:16px;border:1px solid;letter-spacing:.2px;cursor:pointer;transition:all .15s;user-select:none}
.nt.off{background:var(--bg1)!important;color:var(--t3)!important;border-color:var(--brd)!important;opacity:.4}
.nt-0{background:#6366f118;color:#a5b4fc;border-color:#6366f125}
.nt-1{background:#f59e0b18;color:#fcd34d;border-color:#f59e0b25}
.nt-2{background:#ef444418;color:#fca5a5;border-color:#ef444425}
.nt-3{background:#ec489918;color:#f9a8d4;border-color:#ec489925}
.nt-4{background:#22c55e18;color:#86efac;border-color:#22c55e25}
.nt-5{background:#8b5cf618;color:#c4b5fd;border-color:#8b5cf625}

.fb{display:flex;justify-content:space-between;align-items:center}
.fc{display:flex;align-items:center}
.g2{gap:4px}.g3{gap:6px}.g4{gap:10px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:14px}.mb4{margin-bottom:20px}
.mt2{margin-top:8px}.mt3{margin-top:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Capability tags */
.cap{display:inline-flex;padding:2px 7px;font-size:.55rem;font-weight:600;border-radius:16px;background:var(--bg1);color:var(--t2);border:1px solid var(--brd);margin:1px;transition:all .15s}
.cap-active{background:var(--acs);color:#a5b4fc;border-color:#4f6cf725}
.cap-sel{cursor:pointer}.cap-sel:hover{border-color:var(--brdh)}
.cap-sel.off{opacity:.35}

/* Coverage matrix */
.matrix{width:100%;border-collapse:collapse;font-size:.65rem;margin-top:6px}
.matrix th{padding:5px 6px;text-align:left;font-weight:600;color:var(--t3);font-family:var(--fm);font-size:.5rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--brd)}
.matrix td{padding:4px 6px;border-bottom:1px solid #1a2040}
.matrix .name{font-weight:600;font-size:.68rem;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.matrix .dot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:.5rem;transition:all .2s}
.dot-on{background:var(--acs);color:var(--ac)}
.dot-off{background:var(--bg1);color:var(--t4)}
.dot-warn{background:var(--ambs);color:var(--amb)}
.matrix-header-cell{text-align:center!important;font-size:.48rem!important}

/* Phase cards in detail */
.pc{border-left:3px solid;margin-bottom:7px;overflow:hidden}
.pc[data-p="0"]{border-left-color:#6366f1}.pc[data-p="1"]{border-left-color:#f59e0b}
.pc[data-p="2"]{border-left-color:#ef4444}.pc[data-p="3"]{border-left-color:#ec4899}
.pc[data-p="4"]{border-left-color:#22c55e}.pc[data-p="5"]{border-left-color:#8b5cf6}
.ph{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .15s}
.ph:hover{background:var(--bg2h)}
.phi{display:flex;align-items:center;gap:7px}
.phn{font-weight:600;font-size:.8rem}.phm{font-size:.6rem;color:var(--t3);margin-top:1px}
.pb{padding:0 14px 14px;border-top:1px solid var(--brd);display:none}.pb.open{display:block;animation:fi .2s}
.phs{margin-top:10px}
.st{font-family:var(--fm);font-size:.53rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.st svg{width:10px;height:10px}

.tc{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r);font-size:.68rem;margin:1px}
.tc b{font-weight:600}.tc span{color:var(--t3);font-size:.58rem}
.tb{padding:7px;background:var(--bg1);border-radius:var(--r);border:1px solid var(--brd)}
.tb .tn{font-size:.72rem;font-weight:600;margin-bottom:1px}
.tb .rl{font-size:.62rem;color:var(--t3);padding-left:6px;line-height:1.5}
.tb .rl b{color:var(--t2);font-weight:500}

.ai{display:flex;gap:6px;align-items:flex-start;padding:4px 0;border-radius:6px;transition:background .1s}
.ai:hover{background:#ffffff04}
.ai:hover .act-btns{opacity:1}
.an{width:17px;height:17px;border-radius:50%;background:var(--bg1);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:600;color:var(--t3);flex-shrink:0;margin-top:2px}
.at{font-size:.72rem;color:var(--t2);line-height:1.5;flex:1}
.at.esc{color:var(--red);font-weight:600}
.ar{font-size:.55rem;display:inline-flex;padding:1px 5px;border-radius:10px;margin-right:3px;font-weight:600}
.ar-role{background:var(--blus);color:var(--blu);border:1px solid #3b82f618}
.ar-tool{background:var(--ambs);color:var(--amb);border:1px solid #f59e0b18}
.ar-is{background:var(--reds);color:var(--red);border:1px solid #ef444418}

.act-btns{opacity:0;transition:opacity .15s;display:flex;gap:1px;flex-shrink:0}

.isb{padding:10px;background:#ef44440a;border:1px solid #ef444418;border-radius:var(--r);margin-top:10px}
.ist{font-family:var(--fm);font-size:.53rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--red);margin-bottom:4px}
.isi{display:flex;gap:5px;align-items:flex-start;padding:2px 0}
.isd{width:4px;height:4px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:5px}
.isi p{font-size:.7rem;color:#fca5a5;line-height:1.3}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:50;display:none;align-items:center;justify-content:center}
.mo.open{display:flex}
.md{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:22px;width:540px;max-width:92vw;max-height:82vh;overflow-y:auto;animation:fadeScale .2s cubic-bezier(.4,0,.2,1);box-shadow:0 24px 80px rgba(0,0,0,.5)}
.md h2{font-size:.9rem;font-weight:700;margin-bottom:14px}
.md .fr{margin-bottom:9px}

/* Confirm dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:60;display:flex;align-items:center;justify-content:center;animation:fi .15s}
.confirm-box{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:22px;width:380px;max-width:90vw;box-shadow:0 24px 80px rgba(0,0,0,.5);animation:fadeScale .2s}
.confirm-box h3{font-size:.88rem;font-weight:700;margin-bottom:6px}
.confirm-box p{font-size:.75rem;color:var(--t2);margin-bottom:16px;line-height:1.4}
.confirm-box .fc{justify-content:flex-end}

/* Gen */
.gb{padding:18px;border-radius:var(--rl);background:linear-gradient(135deg,#10162e,#1a1f4a);border:1px solid var(--brd);cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.gb::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,#4f6cf708 60%,transparent 80%);background-size:200% 200%;animation:shimmer 6s ease infinite;pointer-events:none}
.gb:hover{border-color:var(--ac);box-shadow:0 6px 32px var(--acg);transform:translateY(-2px)}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.ec{padding:9px 10px;border-radius:var(--r);background:var(--bg1);border:1px solid var(--brd);cursor:pointer;transition:all .2s}
.ec:hover{border-color:var(--ac);background:var(--bg2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.ec h4{font-size:.72rem;font-weight:600;margin-bottom:1px}.ec p{font-size:.6rem;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.genb{width:100%;padding:14px;background:linear-gradient(135deg,var(--ac),#6b5cf7);color:#fff;border:none;border-radius:var(--rl);font-size:.88rem;font-weight:700;cursor:pointer;transition:all .3s;font-family:var(--fs);display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden}
.genb::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transform:translateX(-100%);transition:transform .6s}
.genb:hover::before{transform:translateX(100%)}
.genb:hover{box-shadow:0 5px 28px var(--acg);transform:translateY(-1px)}.genb:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none}

.sevs{display:flex;gap:4px}
.sev{padding:5px 12px;border-radius:var(--r);font-size:.7rem;font-weight:600;cursor:pointer;border:1px solid var(--brd);background:var(--bg1);color:var(--t3);transition:all .2s}
.sev:hover{border-color:var(--brdh)}
.sev.on[data-s="low"]{background:var(--grns);color:var(--grn);border-color:#22c55e35}
.sev.on[data-s="medium"]{background:var(--ambs);color:var(--amb);border-color:#f59e0b35}
.sev.on[data-s="high"]{background:var(--reds);color:var(--red);border-color:#ef444435}
.sev.on[data-s="critical"]{background:#dc262625;color:#fca5a5;border-color:#dc262645}

/* Stats */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:20px}
.sc{padding:14px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}.sc:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3)}
.sc::after{content:'';position:absolute;top:0;right:0;width:50px;height:50px;background:radial-gradient(circle,currentColor 0%,transparent 70%);opacity:.03;pointer-events:none}
.si{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:7px}
.sv{font-size:1.3rem;font-weight:700;line-height:1}.sl{font-size:.68rem;color:var(--t2);margin-top:1px}

.prg{padding:16px;text-align:center}
.prg .pl{font-size:.75rem;font-weight:600;color:var(--ac);margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:6px}
.prg .pp{font-size:.68rem;color:var(--t2);animation:pulse 1.5s ease infinite}
.pbar{height:3px;background:var(--bg1);border-radius:3px;overflow:hidden;margin-top:7px}
.pfill{height:100%;background:linear-gradient(90deg,var(--ac),#8b5cf6,var(--ac));background-size:200% 100%;animation:shimmer 2s linear infinite;border-radius:3px;transition:width .4s ease}

/* Coverage section */
.cov-section{margin-bottom:16px}
.cov-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.cov-header:hover{background:var(--bg2)}
.cov-header h3{font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:6px}
.cov-body{display:none;padding:8px 14px 12px;border-top:1px solid var(--brd)}
.cov-body.open{display:block;animation:fi .15s}
.cov-warn{display:flex;align-items:center;gap:5px;padding:6px 10px;background:var(--ambs);border:1px solid #f59e0b25;border-radius:var(--r);font-size:.65rem;color:var(--amb);margin-top:6px}
.cov-ok{display:flex;align-items:center;gap:5px;padding:6px 10px;background:var(--grns);border:1px solid #22c55e25;border-radius:var(--r);font-size:.65rem;color:var(--grn);margin-top:6px}

.spinner{width:14px;height:14px;border:2px solid var(--brd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.spinw{border-color:rgba(255,255,255,.2);border-top-color:#fff}
.empty{text-align:center;padding:40px 16px;color:var(--t3)}
.empty svg{margin-bottom:10px;opacity:.3}
.hint{font-size:.58rem;color:var(--t3);margin-top:2px}
.toast{position:fixed;bottom:16px;right:16px;padding:10px 16px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rl);font-size:.72rem;font-weight:500;z-index:100;transform:translateY(60px);opacity:0;transition:all .35s cubic-bezier(.16,1,.3,1);box-shadow:0 8px 30px rgba(0,0,0,.4);display:flex;align-items:center;gap:6px}
.toast.show{transform:translateY(0);opacity:1}.toast.ok{border-color:#22c55e30;color:var(--grn)}

.phase-assign{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.impact-note{font-size:.6rem;color:var(--ac);padding:6px 10px;background:var(--acs);border:1px solid #4f6cf718;border-radius:var(--r);margin-top:8px;display:flex;align-items:center;gap:5px}

/* Detail header bar */
.detail-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:16px;padding:10px 14px;background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r);font-size:.65rem;color:var(--t3)}
.detail-meta .sep{width:1px;height:14px;background:var(--brd)}

/* Export dropdown */
.export-wrap{position:relative;display:inline-flex}
.export-menu{position:absolute;top:100%;right:0;margin-top:4px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:4px;min-width:160px;box-shadow:0 12px 40px rgba(0,0,0,.4);display:none;z-index:5;animation:fi .12s}
.export-menu.open{display:block}
.export-item{display:flex;align-items:center;gap:6px;padding:6px 10px;font-size:.7rem;color:var(--t2);cursor:pointer;border-radius:6px;transition:all .12s}
.export-item:hover{background:var(--bg2h);color:var(--t1)}

/* Keyboard shortcut hint */
.kbd{display:inline-flex;padding:1px 5px;background:var(--bg1);border:1px solid var(--brd);border-radius:4px;font-family:var(--fm);font-size:.5rem;color:var(--t3);margin-left:auto}

/* Filter tabs */
.filter-tabs{display:flex;gap:2px;margin-bottom:14px;padding:2px;background:var(--bg1);border-radius:var(--r);border:1px solid var(--brd);width:fit-content}
.filter-tab{padding:5px 12px;font-size:.7rem;font-weight:500;color:var(--t3);cursor:pointer;border-radius:8px;transition:all .15s}
.filter-tab:hover{color:var(--t2)}
.filter-tab.active{background:var(--bg2);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* Search */
.search-bar{position:relative;margin-bottom:12px}
.search-bar input{padding-left:30px}
.search-bar svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
/* Templates */
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:12px}
.tpl-card{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.tpl-card:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,108,247,.15)}
.tpl-badge{display:inline-flex;align-items:center;gap:4px;font-size:.55rem;font-weight:700;letter-spacing:.5px;padding:2px 8px;border-radius:6px;text-transform:uppercase}
.tpl-badge.critical{background:#ef444420;color:#ef4444}.tpl-badge.high{background:#f59e0b20;color:#f59e0b}
.tpl-badge.medium{background:#3b82f620;color:#3b82f6}.tpl-badge.low{background:#22c55e20;color:#22c55e}
/* Analytics */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:16px 0}
.stat-card{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:16px;text-align:center}
.stat-val{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--ac),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-lbl{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.chart-bar{display:flex;align-items:end;gap:6px;height:120px;margin:12px 0;padding:8px 0;border-bottom:1px solid var(--bd)}
.chart-bar .bar{flex:1;border-radius:6px 6px 0 0;min-width:20px;position:relative;transition:height .3s;cursor:pointer}
.chart-bar .bar:hover{filter:brightness(1.2)}.chart-bar .bar span{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:.45rem;color:var(--t3);white-space:nowrap}
/* Settings */
.settings-section{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:12px}
.settings-section h3{font-size:.75rem;font-weight:700;color:var(--t1);margin-bottom:4px}
.settings-section p{font-size:.6rem;color:var(--t3);margin-bottom:12px}
.settings-input{width:100%;padding:8px 12px;background:var(--c0);border:1px solid var(--bd);border-radius:8px;color:var(--t1);font-size:.65rem;font-family:'IBM Plex Mono',monospace}
.settings-input:focus{outline:none;border-color:var(--ac)}
.settings-btn{padding:6px 16px;border-radius:8px;font-size:.6rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
/* Execution */
.exec-header{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;border-radius:12px;padding:20px;margin-bottom:16px}
.exec-header.completed{background:linear-gradient(135deg,#22c55e,#16a34a)}
.exec-header.paused{background:linear-gradient(135deg,#f59e0b,#d97706)}
.exec-phase{background:var(--c1);border:1px solid var(--bd);border-radius:12px;margin-bottom:12px;overflow:hidden}
.exec-phase-head{padding:12px 16px;font-weight:700;font-size:.7rem;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.exec-action{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd);font-size:.6rem;transition:background .15s}
.exec-action:last-child{border-bottom:none}
.exec-action.done{opacity:.6;text-decoration:line-through}
.exec-check{width:18px;height:18px;border-radius:6px;border:2px solid var(--bd);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.exec-check:hover{border-color:var(--ac)}.exec-check.checked{background:var(--ac);border-color:var(--ac)}
.exec-timer{font-family:'IBM Plex Mono',monospace;font-size:1.5rem;font-weight:800;color:white}
.exec-sla{font-size:.55rem;padding:2px 8px;border-radius:6px;font-weight:600}
.exec-sla.ok{background:#22c55e20;color:#22c55e}.exec-sla.warn{background:#f59e0b20;color:#f59e0b}.exec-sla.breach{background:#ef444420;color:#ef4444}
/* Compliance */
.comp-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.comp-tag{font-size:.5rem;padding:2px 8px;border-radius:6px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid}
.comp-tag.soc2{background:#6366f120;color:#6366f1;border-color:#6366f130}.comp-tag.iso{background:#f59e0b20;color:#f59e0b;border-color:#f59e0b30}
.comp-tag.nistcsf{background:#22c55e20;color:#22c55e;border-color:#22c55e30}.comp-tag.active{opacity:1;box-shadow:0 0 0 2px var(--ac)}.comp-tag.inactive{opacity:.4}
/* Search */
.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:8px 12px 8px 32px;background:var(--c1);border:1px solid var(--bd);border-radius:10px;color:var(--t1);font-size:.65rem}
.search-box input:focus{outline:none;border-color:var(--ac)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--t3)}
/* Version History */
.ver-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--bd);font-size:.6rem}
.ver-item:last-child{border-bottom:none}
.ver-num{font-weight:700;color:var(--ac);font-family:'IBM Plex Mono',monospace}
/* RACI */
.raci-table{width:100%;border-collapse:collapse;font-size:.55rem;margin-top:8px}
.raci-table th,.raci-table td{padding:6px 8px;border:1px solid var(--bd);text-align:center}
.raci-table th{background:var(--c1);font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);font-size:.5rem}
.raci-r{color:#6366f1;font-weight:700}.raci-a{color:#ef4444;font-weight:700}.raci-c{color:#f59e0b;font-weight:700}.raci-i{color:#22c55e;font-weight:700}
/* Drill Mode */
.drill-header{background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border-radius:12px;padding:20px;margin-bottom:16px}
.inject-card{background:#f59e0b15;border:2px solid #f59e0b40;border-radius:12px;padding:14px;margin:10px 0;animation:injectPulse 2s ease infinite}
@keyframes injectPulse{0%,100%{border-color:#f59e0b40}50%{border-color:#f59e0b}}
.inject-card h4{color:#f59e0b;font-size:.7rem;font-weight:700;margin-bottom:4px}
.drill-score{font-size:2.5rem;font-weight:900;text-align:center;margin:12px 0}
.drill-score.excellent{color:#22c55e}.drill-score.good{color:#3b82f6}.drill-score.fair{color:#f59e0b}.drill-score.poor{color:#ef4444}
/* Audit Log */
.audit-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--bd);font-size:.6rem}
.audit-action{font-weight:700;padding:2px 8px;border-radius:6px;font-size:.5rem;text-transform:uppercase;letter-spacing:.5px}
.audit-action.create{background:#22c55e20;color:#22c55e}.audit-action.update{background:#3b82f620;color:#3b82f6}
.audit-action.delete{background:#ef444420;color:#ef4444}.audit-action.execute{background:#f59e0b20;color:#f59e0b}
/* Comments */
.comment-thread{border-left:3px solid var(--ac);padding-left:12px;margin:8px 0}
.comment-item{padding:6px 0;border-bottom:1px solid var(--bd)}
.comment-item:last-child{border-bottom:none}
.comment-author{font-size:.55rem;font-weight:700;color:var(--ac)}.comment-time{font-size:.45rem;color:var(--t3);margin-left:8px}
.comment-text{font-size:.6rem;color:var(--t2);margin-top:2px;line-height:1.5}
.comment-input{display:flex;gap:6px;margin-top:8px}
.comment-input input{flex:1;padding:6px 10px;background:var(--c0);border:1px solid var(--bd);border-radius:8px;color:var(--t1);font-size:.6rem}
/* Maturity */
.maturity-ring{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.maturity-val{font-size:1.8rem;font-weight:900;color:white}
/* ATT&CK Heatmap */
.attack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px;margin:12px 0}
.attack-cell{padding:6px 4px;border-radius:6px;text-align:center;font-size:.45rem;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid transparent}
.attack-cell:hover{transform:scale(1.05)}.attack-cell.covered{background:#22c55e20;color:#22c55e;border-color:#22c55e30}
.attack-cell.partial{background:#f59e0b20;color:#f59e0b;border-color:#f59e0b30}.attack-cell.gap{background:#ef444410;color:#ef4444;border-color:#ef444420}
/* Knowledge Base */
.kb-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--c1);border:1px solid var(--bd);border-radius:8px;margin:4px 0;font-size:.6rem}
.kb-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem}
.kb-icon.doc{background:#3b82f620}.kb-icon.img{background:#22c55e20}.kb-icon.link{background:#f59e0b20}
/* Responsive */
@media(max-width:768px){.exec-header{padding:14px}.exec-timer{font-size:1.2rem}.exec-action{padding:8px 12px;font-size:.55rem}
.stat-grid{grid-template-columns:repeat(2,1fr)}.tpl-grid{grid-template-columns:1fr}
.attack-grid{grid-template-columns:repeat(auto-fill,minmax(60px,1fr))}}
/* Quiz Mode */
.quiz-card{background:var(--c1);border:2px solid var(--bd);border-radius:12px;padding:16px;margin:10px 0;transition:all .2s}
.quiz-card.correct{border-color:#22c55e;background:#22c55e08}.quiz-card.wrong{border-color:#ef4444;background:#ef444408}
.quiz-q{font-size:.75rem;font-weight:700;color:var(--t1);margin-bottom:10px;line-height:1.5}
.quiz-opt{display:block;width:100%;text-align:left;padding:8px 12px;margin:4px 0;border-radius:8px;border:1px solid var(--bd);background:var(--c0);color:var(--t2);font-size:.6rem;cursor:pointer;transition:all .15s}
.quiz-opt:hover{border-color:var(--ac);background:var(--acs)}.quiz-opt.selected{border-color:var(--ac);background:var(--acs);font-weight:600}
.quiz-opt.right{border-color:#22c55e;background:#22c55e15;color:#22c55e}.quiz-opt.wrong-sel{border-color:#ef4444;background:#ef444415;color:#ef4444}
.quiz-result{text-align:center;padding:20px}.quiz-score{font-size:3rem;font-weight:900}
/* Scenario Simulator */
.sim-narrative{padding:16px;background:var(--c1);border:1px solid var(--bd);border-radius:12px;font-size:.7rem;line-height:1.7;color:var(--t2);margin:10px 0}
.sim-choice{display:block;width:100%;text-align:left;padding:10px 14px;margin:5px 0;border-radius:10px;border:2px solid var(--bd);background:var(--c0);color:var(--t1);font-size:.65rem;cursor:pointer;transition:all .15s;font-weight:600}
.sim-choice:hover{border-color:var(--ac);transform:translateX(4px)}.sim-choice:active{transform:scale(.98)}
.sim-history{border-left:3px solid var(--ac);padding-left:12px;margin:8px 0;font-size:.55rem;color:var(--t3)}
/* Certifications */
.cert-card{background:linear-gradient(135deg,var(--c1),var(--c0));border:2px solid;border-radius:14px;padding:16px;text-align:center;position:relative;overflow:hidden}
.cert-card.valid{border-color:#22c55e}.cert-card.expired{border-color:#ef4444;opacity:.7}
.cert-badge{font-size:2rem;margin-bottom:4px}.cert-title{font-size:.7rem;font-weight:700;color:var(--t1)}
.cert-meta{font-size:.5rem;color:var(--t3);margin-top:4px}.cert-score{font-size:1.5rem;font-weight:900;margin:4px 0}
/* Inject Editor */
.inject-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.inject-form input,.inject-form select,.inject-form textarea{padding:6px 10px;background:var(--c0);border:1px solid var(--bd);border-radius:8px;color:var(--t1);font-size:.6rem;font-family:var(--f)}
.inject-form textarea{grid-column:1/-1;min-height:60px;resize:vertical}
/* Webhook Builder */
.wh-card{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--c1);border:1px solid var(--bd);border-radius:10px;margin:4px 0}
.wh-status{width:8px;height:8px;border-radius:50%}.wh-status.active{background:#22c55e}.wh-status.inactive{background:#ef4444}
.wh-name{font-size:.65rem;font-weight:700;flex:1}.wh-events{display:flex;gap:2px;flex-wrap:wrap}
.wh-evt{font-size:.45rem;padding:1px 6px;background:var(--acs);border-radius:10px;color:var(--ac)}
/* IOC Panel */
.ioc-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:.5rem;font-family:var(--fm);margin:2px}
.ioc-tag.ip{background:#3b82f615;color:#3b82f6;border:1px solid #3b82f625}.ioc-tag.hash{background:#6366f115;color:#6366f1;border:1px solid #6366f125}

function showConfirm(title,msg,onYes,yesLabel='Delete',yesClass='btn-d'){
  const el=document.createElement('div');
  el.className='confirm-overlay';
  el.innerHTML=`<div class="confirm-box"><h3>${title}</h3><p>${msg}</p><div class="fc g2"><button class="btn btn-s" id="conf-no">Cancel</button><button class="btn ${yesClass}" id="conf-yes">${yesLabel}</button></div></div>`;
  document.body.appendChild(el);
  el.querySelector('#conf-no').onclick=()=>el.remove();
  el.querySelector('#conf-yes').onclick=()=>{el.remove();onYes()};
  el.onclick=e=>{if(e.target===el)el.remove()};
}

// ===== HELPERS =====
function phTag(idx,on,onclick){const p=getPH()[idx];return`<span class="nt nt-${idx}${on?'':' off'}"${onclick?` onclick="${onclick}"`:''} title="${p.name}">${p.name}</span>`}
function allRoles(){return D.teams.flatMap(t=>t.roles.map(r=>({...r,team:t.name,teamId:t.id})))}
function rolesForPhase(pi){return allRoles().filter(r=>r.phases.includes(pi))}
function toolsForPhase(pi){return D.tools.filter(t=>t.phases.includes(pi))}
function coverage(){return getPH().map((_,i)=>({tools:toolsForPhase(i),roles:rolesForPhase(i)}))}
function gaps(){return coverage().map((c,i)=>({phase:getPH()[i],noTools:c.tools.length===0,noRoles:c.roles.length===0,idx:i})).filter(g=>g.noTools||g.noRoles)}

// ===== GENERATION ENGINE =====
async function genPB(){
const title=document.getElementById('gen-t').value.trim(),desc=document.getElementById('gen-d').value.trim();
if(!title||!desc){toast('Need title + description',sv(IC.wn,13,'var(--amb)'));return}
const btn=document.getElementById('gen-btn'),prg=document.getElementById('gen-prg');
btn.disabled=true;btn.innerHTML='<span class="spinner spinw"></span> Generating...';

const trig=IS_KW.filter(k=>desc.toLowerCase().includes(k));

// Template engine
function buildActions(pi,pTools,pRoles,hasIS,trig){
  const ts=pTools.map(t=>t.name).join(', ')||'available tools';
  const findRole=(cap)=>{const r=pRoles.find(r=>r.caps.includes(cap));return r?r.title:pRoles[0]?.title||'Assigned analyst'};
  const acts=[];
  const capMap={
    0:[['Monitor',`Verify ${ts} agents are deployed and reporting across all endpoints`],['Patch',`Confirm endpoint patching is current and vulnerability scan schedule is active`],['Coordinate',`Review IR team contacts, comms channels, and escalation paths`],['Scan',`Run pre-incident posture check using ${ts}`],['Document',`Validate runbook documentation and evidence collection procedures`]],
    1:[['Monitor',`Monitor ${ts} alerts for indicators of compromise`],['Correlate',`Correlate events across ${ts} to confirm scope and blast radius`],['Analyse',`Determine attack vector, affected systems, and lateral movement paths`],['Triage',`Assign incident severity and document initial findings in tracker`],['Hunt',`Conduct targeted threat hunt across ${ts} for related IoCs`]],
    2:[['Isolate',`Use ${ts} to isolate affected endpoints from the network`],['Block',`Block malicious IPs, domains, and hashes across proxy and firewall`],['Contain',`Disable compromised accounts and revoke active sessions`],['Isolate',`Implement network segmentation to prevent lateral spread`],['Investigate',`Preserve forensic evidence and memory dumps before remediation`]],
    3:[['Eradicate',`Deploy ${ts} to remove all malicious artefacts from affected systems`],['Remediate',`Reset credentials for all compromised and potentially compromised accounts`],['Patch',`Patch the exploited vulnerability across all affected and similar systems`],['Scan',`Full environment scan using ${ts} for persistence mechanisms`],['Eradicate',`Verify complete removal via secondary scan and manual checks`]],
    4:[['Restore',`Restore affected systems from verified clean backups`],['Monitor',`Monitor restored systems via ${ts} for re-infection indicators`],['Restore',`Gradually return systems to production with enhanced logging`],['Coordinate',`Validate business operations are functioning normally`],['Scan',`Confirm all security controls and agents are fully operational`]],
    5:[['Coordinate',`Conduct post-incident review within 5 business days`],['Document',`Document lessons learned, full timeline, and response effectiveness`],['Report',`Update playbooks and detection rules based on findings`],['Audit',`Identify gaps in detection, tooling, and process`],['Report',`Review ${ts} configurations for detection improvements`]],
  };
  (capMap[pi]||[]).forEach(([cap,action])=>{
    const role=findRole(cap);
    acts.push(`[${role}] ${action}`);
  });
  if(hasIS&&pi===1)acts.push(`[${findRole('Escalate')}] ESCALATION: Assess data breach — notify InfoSec immediately if confirmed`);
  return acts;
}

function buildISActions(pi,trig){
  const ts=trig.slice(0,3).join(', ');
  const mgr=allRoles().find(r=>r.caps.includes('Notify')&&r.team.toLowerCase().includes('infosec'))?.title||'InfoSec Manager';
  const analyst=allRoles().find(r=>r.caps.includes('Audit')&&r.team.toLowerCase().includes('infosec'))?.title||'InfoSec Analyst';
  const m={
    1:[[mgr,`Notified — triggered by: ${ts}`],[mgr,`Assess regulatory notification requirements (ICO, GDPR)`],[analyst,`Begin data impact assessment — identify affected data types`]],
    2:[[analyst,`Oversee evidence preservation for regulatory inquiry`],[mgr,`Coordinate with Legal on breach notification timeline`],[analyst,`Document chain of custody for all forensic evidence`]],
    4:[[analyst,`Validate data integrity post-recovery`],[mgr,`Confirm no ongoing data exposure channels remain`]],
    5:[[mgr,`Lead regulatory notification if required (72-hr ICO window)`],[analyst,`Prepare breach report: scope, impact, remediation`],[mgr,`Update DPIA based on incident findings`],[analyst,`Review data handling procedures to prevent recurrence`]],
  };
  return(m[pi]||[]).map(([r,a])=>`[${r}] ${a}`);
}

function edAct(pbId,pi,idx){const pb=D.playbooks.find(p=>p.id===pbId),phase=pb?.phases.find(p=>p.idx===pi);if(!phase)return;const el=document.getElementById(`a-${pbId}-${pi}-${idx}`),cur=phase.actions[idx];el.innerHTML=`<span class="an">${idx+1}</span><div style="display:flex;gap:3px;align-items:center;flex:1"><input class="inp" id="aed" value="${cur.replace(/"/g,'&quot;')}" style="font-size:.72rem;padding:4px 8px"><button class="btn btn-sm btn-p" onclick="svAct('${pbId}',${pi},${idx})">${sv(IC.sv2,10)}</button><button class="btn-g" onclick="detail('${pbId}')">${sv(IC.x,10)}</button></div>`;document.getElementById('aed').focus();document.getElementById('aed').onkeydown=e=>{if(e.key==='Enter')svAct(pbId,pi,idx);if(e.key==='Escape')detail(pbId)}}

// Universal download helper — works inside iframes
function dlFile(blob, filename) {
  try {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    // Cleanup after a delay to ensure download starts
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 250);
  } catch(e) {
    // Fallback: send to parent frame
    try {
      const reader = new FileReader();
      reader.onload = function() {
        window.parent.postMessage({ type: 'DOWNLOAD_FILE', dataUrl: reader.result, filename: filename }, '*');
      };
      reader.readAsDataURL(blob);
    } catch(e2) { console.error('Download failed:', e2); }
  }
}

function exportMD(id){
const pb=D.playbooks.find(p=>p.id===id);if(!pb)return;
let md=`# ${pb.title}\n\n`;
md+=`**Framework:** ${FRAMEWORKS[pb.framework||'nist']?.name||'NIST SP 800-61'} | **Status:** ${pb.status} | **Severity:** ${pb.scenario.s} | **Date:** ${pb.date}${pb.ai?' | **AI Generated**':''}\n\n`;
md+=`## Scenario\n\n**${pb.scenario.t}**\n\n${pb.scenario.d}\n\n`;
if(pb.trig?.length)md+=`**InfoSec Triggers:** ${pb.trig.join(', ')}\n\n`;
md+=`---\n\n## ${FRAMEWORKS[pb.framework||'nist']?.name||'NIST'} Phases\n\n`;
pb.phases.forEach(ph=>{
  md+=`### ${ph.emoji} Phase ${ph.idx+1}: ${ph.name}\n\n`;
  md+=`**Tools:** ${ph.tools.map(t=>t.name).join(', ')||'None mapped'}\n\n`;
  md+=`**Teams:** ${ph.teams.map(t=>t.name).join(', ')||'None assigned'}\n\n`;
  md+=`**Actions:**\n\n`;
  ph.actions.forEach((a,i)=>md+=`${i+1}. ${a}\n`);
  if(ph.isReq&&ph.isActions.length){
    md+=`\n**InfoSec Escalation:**\n\n`;
    ph.isActions.forEach(a=>md+=`- 🔴 ${a}\n`);
  }
  md+='\n';
});
const blob=new Blob([md],{type:'text/markdown'});
dlFile(blob, `${pb.title.replace(/[^a-zA-Z0-9]/g,'-')}.md`);
toast('Exported as Markdown');
}

// CSV Checklist Export
function exportCSV(id){
const pb=D.playbooks.find(p=>p.id===id);if(!pb)return;
const esc=v=>{const s=String(v||'');return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s};
const rows=[['Phase','#','Role','Action','Tools','Severity','InfoSec','Status','Framework','Complete']];

pb.phases.forEach(ph=>{
  ph.actions.forEach((a,i)=>{
    const rm=a.match(/^\[([^\]]+)\]\s*/);
    const role=rm?rm[1]:'';
    const action=rm?a.slice(rm[0].length):a;
    const toolNames=D.tools.filter(t=>a.toLowerCase().includes(t.name.toLowerCase())).map(t=>t.name).join('; ');
    rows.push([
      esc(ph.name),
      i+1,
      esc(role),
      esc(action),
      esc(toolNames),
      esc(pb.scenario.s),
      ph.isReq?'Yes':'No',
      esc(pb.status),
      esc(FRAMEWORKS[pb.framework||'nist']?.short||'NIST IR'),
      '☐'
    ]);
  });
  if(ph.isReq&&ph.isActions.length){
    ph.isActions.forEach((a,i)=>{
      const rm=a.match(/^\[([^\]]+)\]\s*/);
      const role=rm?rm[1]:'';
      const action=rm?a.slice(rm[0].length):a;
      rows.push([
        esc(ph.name+' (InfoSec)'),
        i+1,
        esc(role),
        esc(action),
        '',
        esc(pb.scenario.s),
        'Yes',
        esc(pb.status),
        esc(FRAMEWORKS[pb.framework||'nist']?.short||'NIST IR'),
        '☐'
      ]);
    });
  }
});

const csv=rows.map(r=>r.join(',')).join('\n');
const bom='\uFEFF';
const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8;'});
dlFile(blob, `${pb.title.replace(/[^a-zA-Z0-9]/g,'-')}-checklist.csv`);
toast('Exported as CSV Checklist');
}

// PDF Export
function exportPDF(id){
const pb=D.playbooks.find(p=>p.id===id);if(!pb)return;
const{jsPDF}=window.jspdf;
const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
const W=210,H=297,ML=18,MR=18,MT=20,MB=20;
const CW=W-ML-MR;
let y=MT;

// Colors
const C={
  dark:[15,20,40],primary:[79,108,247],red:[239,68,68],amber:[245,158,11],
  green:[34,197,94],text:[30,35,55],muted:[100,110,140],light:[240,242,248],
  white:[255,255,255],bg:[248,249,252]
};

function checkPage(need){if(y+need>H-MB){doc.addPage();y=MT;drawHeader();return true}return false}

function drawHeader(){
  doc.setFillColor(...C.dark);doc.rect(0,0,W,12,'F');
  doc.setFontSize(7);doc.setTextColor(...C.white);
  doc.text('RUNBOOKHQ',ML,7.5);
  const fwName=FRAMEWORKS[pb.framework||'nist']?.short||'NIST IR';
  doc.text(fwName.toUpperCase()+' LIFECYCLE',W-MR,7.5,{align:'right'});
  y=MT;
}

function drawFooter(pageNum,totalPages){
  doc.setFontSize(6.5);doc.setTextColor(...C.muted);
  doc.text(`Page ${pageNum} of ${totalPages}`,W/2,H-10,{align:'center'});
  doc.text(pb.date,W-MR,H-10,{align:'right'});
  doc.text('CONFIDENTIAL',ML,H-10);
}

// Severity color
function sevColor(s){return{low:C.green,medium:C.amber,high:C.red,critical:C.red}[s]||C.muted}

// Word-wrap utility
function wrapText(text,maxW,fontSize){
  doc.setFontSize(fontSize);
  return doc.splitTextToSize(text,maxW);
}

// ─── PAGE 1: COVER ───
doc.setFillColor(...C.dark);doc.rect(0,0,W,H,'F');

// Large shield graphic
doc.setFillColor(79,108,247);doc.setGlobalAlpha&&doc.setGlobalAlpha?doc.setFillColor(40,55,120):0;
doc.roundedRect(W/2-25,45,50,55,4,4,'F');
doc.setFillColor(...C.primary);
doc.roundedRect(W/2-20,50,40,44,3,3,'F');

doc.setTextColor(...C.white);doc.setFontSize(28);doc.setFont('helvetica','bold');
doc.text('INCIDENT',W/2,125,{align:'center'});
doc.text('RESPONSE',W/2,137,{align:'center'});
doc.text('PLAYBOOK',W/2,149,{align:'center'});

doc.setDrawColor(79,108,247);doc.setLineWidth(0.5);
doc.line(W/2-40,158,W/2+40,158);

doc.setFontSize(11);doc.setFont('helvetica','normal');doc.setTextColor(160,175,210);
const titleLines=wrapText(pb.title,CW-20,11);
titleLines.forEach((line,i)=>{doc.text(line,W/2,170+i*6,{align:'center'})});

const metaY=170+titleLines.length*6+12;
doc.setFontSize(8);doc.setTextColor(120,135,170);
doc.text(`Status: ${pb.status.toUpperCase()}  |  Severity: ${pb.scenario.s.toUpperCase()}  |  Date: ${pb.date}${pb.ai?'  |  AI Generated':''}`,W/2,metaY,{align:'center'});

if(pb.isec){
  doc.setFontSize(7.5);doc.setTextColor(...C.red);
  doc.text('⚠ INFOSEC ESCALATION ACTIVE',W/2,metaY+8,{align:'center'});
}

doc.setFontSize(7);doc.setTextColor(80,90,120);
doc.text('Framework: '+FRAMEWORKS[pb.framework||'nist']?.name||'NIST SP 800-61',W/2,H-30,{align:'center'});
doc.text('Generated by RunbookHQ',W/2,H-24,{align:'center'});

// ─── PAGE 2: SCENARIO ───
doc.addPage();y=MT;drawHeader();

doc.setFontSize(16);doc.setFont('helvetica','bold');doc.setTextColor(...C.text);
doc.text('Scenario Overview',ML,y+8);y+=16;

doc.setDrawColor(...C.primary);doc.setLineWidth(0.8);
doc.line(ML,y,ML+35,y);y+=8;

// Scenario card
doc.setFillColor(...C.light);doc.roundedRect(ML,y,CW,0,3,3,'F');
const scTitle=wrapText(pb.scenario.t,CW-16,11);
const scDesc=wrapText(pb.scenario.d,CW-16,9);
const cardH=12+scTitle.length*5.5+4+scDesc.length*4.5+10;
doc.setFillColor(...C.light);doc.roundedRect(ML,y,CW,cardH,3,3,'F');
doc.setDrawColor(200,210,230);doc.roundedRect(ML,y,CW,cardH,3,3,'S');

let cy=y+8;
doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(...C.text);
scTitle.forEach(line=>{doc.text(line,ML+8,cy);cy+=5.5});
cy+=2;
doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(...C.muted);
scDesc.forEach(line=>{doc.text(line,ML+8,cy);cy+=4.5});
y+=cardH+6;

// Metadata badges row
const badges=[
  {label:'SEVERITY',value:pb.scenario.s.toUpperCase(),color:sevColor(pb.scenario.s)},
  {label:'STATUS',value:pb.status.toUpperCase(),color:C.primary},
  {label:'PHASES',value:'6',color:C.muted},
  {label:'ACTIONS',value:String(pb.phases.reduce((s,ph)=>s+ph.actions.length,0)),color:C.muted},
];
if(pb.ai)badges.push({label:'SOURCE',value:'AI',color:C.primary});
const bw=CW/badges.length;
badges.forEach((b,i)=>{
  const bx=ML+i*bw;
  doc.setFillColor(245,247,252);doc.roundedRect(bx,y,bw-3,16,2,2,'F');
  doc.setFontSize(5.5);doc.setFont('helvetica','bold');doc.setTextColor(...C.muted);
  doc.text(b.label,bx+bw/2-1.5,y+5.5,{align:'center'});
  doc.setFontSize(9);doc.setTextColor(...b.color);
  doc.text(b.value,bx+bw/2-1.5,y+12,{align:'center'});
});
y+=24;

// InfoSec triggers
if(pb.trig?.length){
  checkPage(18);
  doc.setFillColor(254,242,242);doc.roundedRect(ML,y,CW,14,2,2,'F');
  doc.setDrawColor(252,200,200);doc.roundedRect(ML,y,CW,14,2,2,'S');
  doc.setFontSize(6.5);doc.setFont('helvetica','bold');doc.setTextColor(...C.red);
  doc.text('INFOSEC TRIGGERS:',ML+6,y+6);
  doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(180,60,60);
  doc.text(pb.trig.join('  •  '),ML+38,y+6);
  y+=20;
}

// ─── PHASE PAGES ───
const phaseColors=[[99,102,241],[245,158,11],[239,68,68],[236,72,153],[34,197,94],[139,92,246]];

pb.phases.forEach((ph,pi)=>{
  doc.addPage();y=MT;drawHeader();

  // Phase header stripe
  const pc=phaseColors[pi]||C.primary;
  doc.setFillColor(...pc);doc.rect(ML,y,CW,1.2,'F');y+=5;

  doc.setFontSize(6);doc.setFont('helvetica','bold');doc.setTextColor(...pc);
  doc.text(`PHASE ${pi+1} OF ${pb.phases.length}`,ML,y);y+=5;

  doc.setFontSize(15);doc.setFont('helvetica','bold');doc.setTextColor(...C.text);
  doc.text(`${ph.emoji}  ${ph.name}`,ML,y);y+=4;

  if(ph.isReq){
    doc.setFontSize(6.5);doc.setTextColor(...C.red);doc.setFont('helvetica','bold');
    doc.text('INFOSEC ESCALATION ACTIVE',ML,y+3);y+=4;
  }
  y+=5;

  // Tools
  doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...C.muted);
  doc.text('TOOLS',ML,y);y+=4;
  if(ph.tools.length){
    let tx=ML;
    ph.tools.forEach(t=>{
      const tw=doc.getTextWidth(`${t.name} (${t.cat})`)+8;
      if(tx+tw>W-MR){tx=ML;y+=7}
      doc.setFillColor(245,247,252);doc.roundedRect(tx,y-3,tw,6,1.5,1.5,'F');
      doc.setFontSize(6.5);doc.setFont('helvetica','bold');doc.setTextColor(...C.text);
      doc.text(t.name,tx+3,y+0.5);
      const nw=doc.getTextWidth(t.name);
      doc.setFont('helvetica','normal');doc.setTextColor(...C.muted);
      doc.text(` (${t.cat})`,tx+3+nw,y+0.5);
      tx+=tw+3;
    });
    y+=9;
  } else {
    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(...C.amber);
    doc.text('⚠ No tools mapped to this phase',ML,y);y+=7;
  }

  // Teams
  doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(...C.muted);
  doc.text('TEAMS & ROLES',ML,y);y+=5;
  if(ph.teams.length){
    ph.teams.forEach(tm=>{
      checkPage(12);
      doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(...C.text);
      doc.text(tm.name,ML+2,y);y+=4;
      tm.roles.forEach(r=>{
        doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.setTextColor(...C.muted);
        doc.text(`→ ${r.title}  [${r.caps.slice(0,3).join(', ')}]`,ML+6,y);y+=3.8;
      });
      y+=2;
    });
  } else {
    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(...C.amber);
    doc.text('⚠ No roles assigned to this phase',ML,y);y+=6;
  }
  y+=3;

  // Actions header
  doc.setDrawColor(...pc);doc.setLineWidth(0.3);doc.line(ML,y,W-MR,y);y+=5;
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(...C.text);
  doc.text('Response Actions',ML,y);y+=6;

  // Actions
  ph.actions.forEach((a,ai)=>{
    const rm=a.match(/^\[([^\]]+)\]\s*/);
    const role=rm?rm[1]:'';
    const action=rm?a.slice(rm[0].length):a;
    const isEsc=action.includes('ESCALATION');
    const lines=wrapText(action,CW-30,8);
    checkPage(6+lines.length*4);

    // Number circle
    doc.setFillColor(isEsc?239:230,isEsc?68:235,isEsc?68:245);
    doc.circle(ML+3,y-0.5,2.8,'F');
    doc.setFontSize(6);doc.setFont('helvetica','bold');
    doc.setTextColor(isEsc?255:100,isEsc?255:110,isEsc?255:140);
    doc.text(String(ai+1),ML+3,y+0.5,{align:'center'});

    // Role badge
    if(role){
      const rw=doc.getTextWidth(role)+5;
      doc.setFillColor(220,230,255);doc.roundedRect(ML+8,y-3,rw,5,1.2,1.2,'F');
      doc.setFontSize(5.5);doc.setFont('helvetica','bold');doc.setTextColor(60,100,220);
      doc.text(role,ML+10.5,y+0.2);
    }

    // Action text
    const axOff=role?(doc.getTextWidth(role)+17):10;
    doc.setFontSize(8);doc.setFont('helvetica','normal');
    if(isEsc){doc.setTextColor(200,50,50)}else{doc.setTextColor(...C.text)}

    const firstLine=lines[0];
    const remainLines=lines.slice(1);
    doc.text(firstLine,ML+axOff,y);
    remainLines.forEach((ln,li)=>{y+=4;doc.text(ln,ML+10,y)});
    y+=6;
  });

  // InfoSec escalation box
  if(ph.isReq&&ph.isActions.length){
    checkPage(10+ph.isActions.length*7);
    y+=2;
    const isH=8+ph.isActions.length*6;
    doc.setFillColor(254,242,242);doc.roundedRect(ML,y,CW,isH,2,2,'F');
    doc.setDrawColor(252,180,180);doc.roundedRect(ML,y,CW,isH,2,2,'S');
    y+=5;
    doc.setFontSize(6.5);doc.setFont('helvetica','bold');doc.setTextColor(...C.red);
    doc.text('INFOSEC ESCALATION',ML+5,y);y+=5;

    ph.isActions.forEach(a=>{
      const rm=a.match(/^\[([^\]]+)\]\s*/);
      const role=rm?rm[1]:'';
      const action=rm?a.slice(rm[0].length):a;
      doc.setFillColor(...C.red);doc.circle(ML+7,y-0.8,1,'F');
      doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(160,40,40);
      const aLines=wrapText(`[${role}] ${action}`,CW-18,7);
      aLines.forEach((ln,li)=>{doc.text(ln,ML+11,y+li*3.8)});
      y+=aLines.length*3.8+2;
    });
    y+=4;
  }
});

// ─── FOOTER ON ALL PAGES ───
const totalPages=doc.getNumberOfPages();
for(let i=1;i<=totalPages;i++){
  doc.setPage(i);
  drawFooter(i,totalPages);
}

const pdfBlob = doc.output('blob');
dlFile(pdfBlob, `${pb.title.replace(/[^a-zA-Z0-9]/g,'-')}.pdf`);
toast('Exported as PDF');
}

// ===== RACI MATRIX =====
function generateRACIHtml(pb){
if(!pb)return'<p style="color:var(--t3);font-size:.6rem">No playbook data</p>';
const roles=new Set();
pb.phases.forEach(ph=>{ph.actions.forEach(a=>{const m=a.match(/^\[([^\]]+)\]/);if(m)roles.add(m[1])})});
const roleArr=[...roles];
if(roleArr.length===0)return'<p style="color:var(--t3);font-size:.6rem">No roles found in actions. Add [Role Name] prefixes to actions.</p>';
let html=`<table class="raci-table"><thead><tr><th style="text-align:left">Phase / Action</th>${roleArr.map(r=>`<th>${r}</th>`).join('')}</tr></thead><tbody>`;
pb.phases.forEach(ph=>{
html+=`<tr style="background:var(--c1)"><td colspan="${roleArr.length+1}" style="font-weight:700;text-align:left">${ph.emoji} ${ph.name}</td></tr>`;
ph.actions.forEach((a,i)=>{
const m=a.match(/^\[([^\]]+)\]\s*(.*)/);
const responsible=m?m[1]:'';
const actionText=m?m[2]:a;
html+=`<tr><td style="text-align:left">${actionText.slice(0,60)}${actionText.length>60?'...':''}</td>`;
roleArr.forEach(r=>{
if(r===responsible)html+=`<td><span class="raci-r">R</span></td>`;
else if(i===0&&r===roleArr[0])html+=`<td><span class="raci-a">A</span></td>`;
else if(ph.actions.some(x=>x.includes(`[${r}]`)))html+=`<td><span class="raci-c">C</span></td>`;
else html+=`<td><span class="raci-i">I</span></td>`;
});
html+=`</tr>`;
});
});
html+=`</tbody></table>`;
return html;
}

// ===== EXECUTION MODE =====
let currentExecution=null;
let execTimer=null;
let execSeconds=0;

function startExecution(pbId){
const pb=D.playbooks.find(p=>p.id===pbId);if(!pb)return;
const ref=prompt('Incident reference (optional):','INC-'+Date.now().toString(36).toUpperCase());
currentExecution={id:'local-'+Date.now(),playbookId:pbId,playbook:pb,incidentRef:ref||'',status:'RUNNING',startedAt:new Date().toISOString(),actions:[]};
// Build actions
pb.phases.forEach((ph,pi)=>{
ph.actions.forEach((a,ai)=>{currentExecution.actions.push({id:`${pi}-${ai}`,phase:ph.name,phaseIndex:pi,actionText:a,completed:false,completedAt:null,completedBy:null})});
if(ph.isReq&&ph.isActions){ph.isActions.forEach((a,ai)=>{currentExecution.actions.push({id:`${pi}-is-${ai}`,phase:ph.name+' (InfoSec)',phaseIndex:pi,actionText:a,completed:false,completedAt:null,completedBy:null})})}
});
execSeconds=0;
startExecTimer();
renderExecution();
// Try to persist to server
fetch('/api/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'start',playbookId:pbId,incidentRef:ref})}).then(r=>r.json()).then(d=>{if(d.execution)currentExecution.serverId=d.execution.id}).catch(()=>{});
}

function startExecTimer(){if(execTimer)clearInterval(execTimer);execTimer=setInterval(()=>{execSeconds++;const el=document.getElementById('exec-elapsed');if(el)el.textContent=formatDuration(execSeconds)},1000)}
function formatDuration(s){const h=Math.floor(s/3600);const m=Math.floor((s%3600)/60);const sec=s%60;return`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`}

function toggleExecAction(actionId){

function pauseExecution(){if(currentExecution){currentExecution.status='PAUSED';clearInterval(execTimer);renderExecution();toast('Execution paused')}}

// ===== POST-INCIDENT REPORT =====
function generatePIR(){
if(!currentExecution)return;
const pb=currentExecution.playbook;
const done=currentExecution.actions.filter(a=>a.completed);
const notDone=currentExecution.actions.filter(a=>!a.completed);
const duration=formatDuration(execSeconds);
const phases=[...new Set(currentExecution.actions.map(a=>a.phase))];

let md=`# Post-Incident Report\n## ${pb.title}\n\n`;
md+=`**Incident Reference:** ${currentExecution.incidentRef||'N/A'}\n`;
md+=`**Severity:** ${pb.scenario?.s||'Medium'}\n`;
md+=`**Started:** ${new Date(currentExecution.startedAt).toLocaleString()}\n`;
md+=`**Completed:** ${currentExecution.completedAt?new Date(currentExecution.completedAt).toLocaleString():'N/A'}\n`;
md+=`**Duration:** ${duration}\n`;
md+=`**Status:** ${currentExecution.status}\n`;
md+=`**Framework:** ${FRAMEWORKS[pb.framework||'nist']?.name||'NIST'}\n\n`;
md+=`---\n\n## Executive Summary\n\n`;
md+=`An incident of **${pb.scenario?.s||'medium'}** severity was detected and responded to using the "${pb.title}" playbook. `;
md+=`${done.length} of ${currentExecution.actions.length} response actions were completed over a period of ${duration}.\n\n`;
md+=`## Response Timeline\n\n`;
phases.forEach(phase=>{
md+=`### ${phase}\n\n`;
const pa=currentExecution.actions.filter(a=>a.phase===phase);
pa.forEach(a=>{
md+=`- [${a.completed?'x':' '}] ${a.actionText}`;
if(a.completedAt)md+=` *(${new Date(a.completedAt).toLocaleTimeString()})*`;
md+=`\n`;
});
md+=`\n`;
});
if(notDone.length){
md+=`## Incomplete Actions\n\n`;
notDone.forEach(a=>{md+=`- ⚠ ${a.phase}: ${a.actionText}\n`});
md+=`\n`;
}
md+=`## Recommendations\n\n- [ ] Review and address all incomplete actions\n- [ ] Update playbook based on response experience\n- [ ] Schedule follow-up review within 5 business days\n- [ ] Update threat intelligence with indicators from this incident\n\n`;
md+=`---\n*Generated by RunbookHQ on ${new Date().toLocaleString()}*\n`;

const blob=new Blob([md],{type:'text/markdown'});
dlFile(blob,`PIR-${(currentExecution.incidentRef||pb.title).replace(/[^a-zA-Z0-9]/g,'-')}.md`);
toast('Post-Incident Report exported');
}

// ===== TABLETOP DRILL MODE =====
const INJECT_LIBRARY=[
{text:'⚡ INJECT: A second system has been compromised. The attack is spreading laterally.',timing:300},{text:'⚡ INJECT: Management is asking for an immediate status update for the board.',timing:600},{text:'⚡ INJECT: A journalist has contacted your comms team about the incident.',timing:900},{text:'⚡ INJECT: Your primary backup system is reporting corruption errors.',timing:1200},{text:'⚡ INJECT: Law enforcement has requested you preserve all evidence immediately.',timing:450},{text:'⚡ INJECT: A third-party vendor confirms they were the initial entry point.',timing:750},{text:'⚡ INJECT: Social media posts are surfacing about the incident.',timing:1050},{text:'⚡ INJECT: The threat actor has made a ransom demand via encrypted email.',timing:500}];

function startDrill(pbId){
const pb=D.playbooks.find(p=>p.id===pbId);if(!pb)return;
const ref='DRILL-'+Date.now().toString(36).toUpperCase();
currentExecution={id:'drill-'+Date.now(),playbookId:pbId,playbook:pb,incidentRef:ref,status:'RUNNING',mode:'DRILL',startedAt:new Date().toISOString(),actions:[],injects:[],score:null};
pb.phases.forEach((ph,pi)=>{ph.actions.forEach((a,ai)=>{currentExecution.actions.push({id:`${pi}-${ai}`,phase:ph.name,phaseIndex:pi,actionText:a,completed:false,completedAt:null})});});
// Schedule random injects
const shuffled=[...INJECT_LIBRARY].sort(()=>Math.random()-.5).slice(0,3);
shuffled.forEach((inj,i)=>{setTimeout(()=>{if(currentExecution&&currentExecution.status==='RUNNING'){currentExecution.injects.push({text:inj.text,time:new Date().toISOString()});renderExecution()}},inj.timing*1000)});
execSeconds=0;startExecTimer();renderExecution();toast('🎯 Tabletop drill started! Injects will appear during the exercise.');
}

function scoreDrill(){
if(!currentExecution)return 0;
const totalActions=currentExecution.actions.length;
const completed=currentExecution.actions.filter(a=>a.completed).length;
const completionPct=totalActions?completed/totalActions:0;
const pb=currentExecution.playbook;
const slaTotal=pb.phases.length;
let slaMet=0;
pb.phases.forEach(ph=>{const slaMin=getSLA(pb,ph.name);if(execSeconds<slaMin*60)slaMet++});
const slaPct=slaTotal?slaMet/slaTotal:0;
const score=Math.round((completionPct*60+slaPct*40));
return score;
}

function getScoreGrade(s){return s>=90?{grade:'A',cls:'excellent',label:'Excellent'}:s>=70?{grade:'B',cls:'good',label:'Good'}:s>=50?{grade:'C',cls:'fair',label:'Fair'}:{grade:'D',cls:'poor',label:'Needs Improvement'}}

function completeDrill(){
if(!currentExecution)return;
currentExecution.status='COMPLETED';currentExecution.completedAt=new Date().toISOString();
const score=scoreDrill();currentExecution.score=score;
clearInterval(execTimer);renderExecution();
}

md+=`**DPO Contact:** [DPO Name and Contact]\n\n`;
md+=`## 1. Nature of the Personal Data Breach\n\n`;
md+=`**Incident:** ${pb.scenario?.t||pb.title}\n`;
md+=`**Description:** ${pb.scenario?.d||'See attached playbook'}\n`;
md+=`**Severity:** ${pb.scenario?.s||'Medium'}\n`;
md+=`**Date/time breach discovered:** [To be completed]\n`;
md+=`**Date/time breach occurred:** [To be completed]\n\n`;
md+=`## 2. Categories and Approximate Number of Data Subjects\n\n- [Number] data subjects affected\n- Categories: [employees / customers / partners]\n\n`;
md+=`## 3. Categories and Approximate Number of Personal Data Records\n\n- [Number] records affected\n- Types: [names, email, financial, health, etc.]\n\n`;

// ===== QUIZ MODE =====
function generateQuiz(pbId){
const pb=D.playbooks.find(p=>p.id===pbId);if(!pb)return;
const questions=[];
pb.phases.forEach(ph=>{
ph.actions.forEach((a,i)=>{
const roleMatch=a.match(/^\[([^\]]+)\]/);
if(roleMatch&&Math.random()>.5){questions.push({q:`Which role is responsible for: "${a.replace(/^\[[^\]]+\]\s*/,'')}"?`,correct:roleMatch[1],opts:shuffleArray([roleMatch[1],...getRandomRoles(pb,roleMatch[1],3)]).slice(0,4),phase:ph.name})}
if(ph.tools.length&&Math.random()>.6){questions.push({q:`Which tool is used during the "${ph.name}" phase?`,correct:ph.tools[0].name,opts:shuffleArray([ph.tools[0].name,...D.tools.filter(t=>t.name!==ph.tools[0].name).slice(0,3).map(t=>t.name)]).slice(0,4),phase:ph.name})}
});
if(questions.length>=10)return;
});
if(questions.length<3){const fws=Object.keys(FRAMEWORKS);questions.push({q:`What framework is this playbook based on?`,correct:FRAMEWORKS[pb.framework]?.name||pb.framework,opts:shuffleArray(fws.map(f=>FRAMEWORKS[f].name)).slice(0,4),phase:'General'});
questions.push({q:`What is the severity level of this playbook?`,correct:pb.scenario?.s||'medium',opts:['critical','high','medium','low'],phase:'General'});
questions.push({q:`How many phases does this playbook have?`,correct:String(pb.phases.length),opts:shuffleArray([String(pb.phases.length),String(pb.phases.length+1),String(pb.phases.length-1||1),String(pb.phases.length+2)]),phase:'General'});
}
return shuffleArray(questions).slice(0,10);
}
function getRandomRoles(pb,exclude,n){const roles=new Set();pb.phases.forEach(ph=>ph.actions.forEach(a=>{const m=a.match(/^\[([^\]]+)\]/);if(m&&m[1]!==exclude)roles.add(m[1])}));const arr=[...roles];while(arr.length<n)arr.push(['SOC Analyst','IR Lead','Network Engineer','CISO','Legal Counsel','Comms Lead'][arr.length%6]);return arr.slice(0,n)}
function shuffleArray(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

let quizState=null;
V.quiz=()=>{
const el=document.getElementById('pg-quiz');
if(quizState&&quizState.active){renderQuizQuestion();return}
el.innerHTML=`<div class="sec-head"><h2>🧠 Quiz Mode</h2><p>Test your knowledge of playbook procedures with AI-generated questions</p></div>
<div class="settings-section"><h3>Select a Playbook</h3>
${D.playbooks.length===0?'<p style="font-size:.6rem;color:var(--t3)">Create playbooks first.</p>':
D.playbooks.map(pb=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)"><div><span style="font-size:.7rem;font-weight:600">${pb.title}</span> <span class="badge badge-${pb.scenario?.s||'medium'}">${pb.scenario?.s||'medium'}</span></div><button class="btn btn-sm btn-p" onclick="startQuiz('${pb.id}')">🧠 Start Quiz</button></div>`).join('')}</div>
${getQuizHistory().length?`<div class="settings-section"><h3>Recent Attempts</h3>${getQuizHistory().slice(0,10).map(a=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.6rem;border-bottom:1px solid var(--bd)"><span>${a.title}</span><span style="font-weight:700;color:${a.score/a.total>=.7?'#22c55e':'#ef4444'}">${a.score}/${a.total} (${Math.round(a.score/a.total*100)}%)</span></div>`).join('')}</div>`:''}`;
};

function startQuiz(pbId){
const pb=D.playbooks.find(p=>p.id===pbId);if(!pb)return;
const questions=generateQuiz(pbId);
if(!questions||questions.length<2){toast('Not enough content for quiz');return}
quizState={active:true,pbId,pbTitle:pb.title,questions,current:0,answers:[],score:0};
go('quiz');renderQuizQuestion();
}
function renderQuizQuestion(){
if(!quizState)return;
const el=document.getElementById('pg-quiz');
if(quizState.current>=quizState.questions.length){showQuizResults();return}
const q=quizState.questions[quizState.current];
const progress=Math.round((quizState.current/quizState.questions.length)*100);
el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:.7rem;font-weight:700">Question ${quizState.current+1} of ${quizState.questions.length}</div><div style="font-size:.55rem;color:var(--t3)">${quizState.pbTitle} · ${q.phase}</div></div>
<div style="height:6px;background:var(--c0);border-radius:4px;margin-bottom:16px;overflow:hidden"><div style="height:100%;width:${progress}%;background:var(--ac);border-radius:4px;transition:width .3s"></div></div>
<div class="quiz-card"><div class="quiz-q">${q.q}</div>
${q.opts.map((o,i)=>`<button class="quiz-opt" onclick="answerQuiz(${i},'${o.replace(/'/g,"\\'")}')">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>`;
}
function answerQuiz(idx,answer){
const q=quizState.questions[quizState.current];
const correct=answer===q.correct;
if(correct)quizState.score++;
quizState.answers.push({q:q.q,answer,correct:q.correct,isCorrect:correct});
// Brief flash then next
const opts=document.querySelectorAll('.quiz-opt');
opts.forEach(o=>{if(o.textContent.includes(q.correct))o.classList.add('right');if(o.textContent.includes(answer)&&!correct)o.classList.add('wrong-sel')});
setTimeout(()=>{quizState.current++;renderQuizQuestion()},800);
}
function showQuizResults(){
const pct=Math.round(quizState.score/quizState.questions.length*100);
const grade=pct>=90?{l:'Excellent',c:'#22c55e'}:pct>=70?{l:'Good',c:'#3b82f6'}:pct>=50?{l:'Fair',c:'#f59e0b'}:{l:'Needs Work',c:'#ef4444'};
const el=document.getElementById('pg-quiz');

let simState=null;
V.simulator=()=>{
const el=document.getElementById('pg-simulator');
if(simState&&simState.active){renderSimulator();return}
el.innerHTML=`<div class="sec-head"><h2>🎮 Scenario Simulator</h2><p>AI generates a branching incident narrative. Your choices determine the outcome.</p></div>
<div class="settings-section"><h3>Choose a Starting Scenario</h3>
${['Ransomware attack detected on file servers','Suspicious login from overseas IP on exec account','Employee reported clicking phishing link with credential harvester','Unusual data transfer of 50GB to external cloud storage','DDoS attack overwhelming public-facing web applications','Third-party vendor reports they have been compromised'].map((s,i)=>
`<button class="sim-choice" onclick="startSimulation('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('')}
<div style="margin-top:10px"><input class="inp" id="sim-custom" placeholder="Or describe a custom scenario..." style="width:100%;margin-bottom:6px"/><button class="btn btn-p btn-sm" onclick="startSimulation(document.getElementById('sim-custom').value)">🚀 Launch Custom</button></div></div>`;
};

async function startSimulation(scenario){
if(!scenario.trim())return;
simState={active:true,history:[],totalScore:100,scenario,loading:false};
go('simulator');
await simulationStep(`You are running a cybersecurity incident simulation. The scenario is: ${scenario}. Generate the opening narrative and present 2-3 initial response choices.`);
}
async function simulationStep(prompt){
if(!simState||simState.loading)return;
simState.loading=true;renderSimulator();
try{
const res=await fetch('/api/training',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'simulateScenario',data:{prompt}})});
const d=await res.json();
if(d.scenario){
simState.history.push(d.scenario);
simState.totalScore=Math.max(0,simState.totalScore+(d.scenario.score_impact||0));
if(d.scenario.resolved)simState.active=false;
}
}catch(e){simState.history.push({narrative:'Error communicating with AI. Try again.',choices:[],resolved:true})}
simState.loading=false;renderSimulator();
}
function renderSimulator(){
const el=document.getElementById('pg-simulator');
if(!simState)return;
const latest=simState.history[simState.history.length-1];
const resolved=latest?.resolved;
el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:.7rem;font-weight:700">${simState.scenario}</div><div style="font-size:.55rem;color:var(--t3)">Turn ${simState.history.length} · Score: ${simState.totalScore}</div></div>
${simState.history.slice(0,-1).map((h,i)=>`<div class="sim-history"><b>Turn ${i+1}:</b> ${h.narrative?.slice(0,120)}...</div>`).join('')}
${latest?`<div class="sim-narrative">${latest.narrative||''}</div>`:''}
${simState.loading?`<div style="text-align:center;padding:20px"><div class="spinner" style="margin:0 auto"></div><div style="font-size:.6rem;color:var(--t3);margin-top:8px">AI is generating the next scene...</div></div>`:''}
${resolved?`<div class="settings-section" style="text-align:center"><h3>${simState.totalScore>=70?'🏆 Incident Resolved Successfully':'⚠️ Incident Contained'}</h3><div class="drill-score ${simState.totalScore>=80?'excellent':simState.totalScore>=60?'good':'fair'}" style="margin:8px 0">${simState.totalScore}%</div><button class="btn btn-p" onclick="simState=null;go('simulator')">New Scenario</button></div>`:''}
${!resolved&&!simState.loading&&latest?.choices?.length?latest.choices.map(c=>`<button class="sim-choice" onclick="simulationStep('The player chose: ${(c.text||c).replace(/'/g,"\\'")}. Continue the simulation with consequences and new choices.')">${c.text||c}</button>`).join(''):''}`;
}

function handleImportFile(input,type){
const file=input.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=()=>{document.getElementById(type==='json'?'json-paste':'csv-paste').value=reader.result};
reader.readAsText(file);
}
function importJSON(){
const text=document.getElementById('json-paste').value.trim();if(!text){toast('Paste or upload JSON first');return}
try{
const data=JSON.parse(text);
const pbs=Array.isArray(data)?data:[data];
let count=0;
pbs.forEach(pb=>{
if(!pb.title){toast('Missing title');return}
const id='pb-'+uid();
if(!pb.phases&&pb.data?.phases)pb.phases=pb.data.phases;
if(!pb.phases){toast('Missing phases');return}
D.playbooks.push({id,title:pb.title,framework:pb.framework||'nist',status:'draft',scenario:pb.scenario||{t:pb.title,d:pb.description||'Imported',s:pb.severity||'medium'},phases:pb.phases.map((ph,i)=>({idx:i,name:ph.name,emoji:ph.emoji||'📋',actions:ph.actions||[],tools:ph.tools||[],teams:ph.teams||[],isReq:ph.isReq||false,isActions:ph.isActions||[]})),isec:false,ai:false,trig:[],date:new Date().toLocaleDateString('en-GB'),versions:[],complianceTags:pb.complianceTags||[]});
count++;
});
persist();toast(`Imported ${count} playbook(s)`);go('playbooks');
}catch(e){toast('Invalid JSON: '+e.message)}
}
function importCSV(){
const text=document.getElementById('csv-paste').value.trim();if(!text){toast('Paste or upload CSV first');return}
const lines=text.split('\n').map(l=>l.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));
if(lines.length<2){toast('Need header + data rows');return}
const headers=lines[0].map(h=>h.toLowerCase());
const phaseIdx=headers.indexOf('phase'),actionIdx=headers.indexOf('action'),roleIdx=headers.indexOf('role');
if(phaseIdx<0||actionIdx<0){toast('CSV needs Phase and Action columns');return}
const phases={};
for(let i=1;i<lines.length;i++){
const row=lines[i];if(!row[phaseIdx])continue;
const pName=row[phaseIdx];
if(!phases[pName])phases[pName]={name:pName,emoji:'📋',actions:[],tools:[],teams:[],isReq:false,isActions:[]};
const action=roleIdx>=0&&row[roleIdx]?`[${row[roleIdx]}] ${row[actionIdx]}`:row[actionIdx];
phases[pName].actions.push(action);
}
const id='pb-'+uid();
D.playbooks.push({id,title:'Imported Playbook',framework:'nist',status:'draft',scenario:{t:'Imported Playbook',d:'Imported from CSV',s:'medium'},phases:Object.values(phases).map((p,i)=>({...p,idx:i})),isec:false,ai:false,trig:[],date:new Date().toLocaleDateString('en-GB'),versions:[],complianceTags:[]});
persist();toast(`Imported 1 playbook with ${Object.keys(phases).length} phases`);go('playbooks');
}
function bulkExportJSON(){
dlFile(new Blob([JSON.stringify(D.playbooks,null,2)],{type:'application/json'}),'RunbookHQ-AllPlaybooks.json');
toast('All playbooks exported');
}

function addCustomField(){
const name=document.getElementById('cf-name').value.trim(),type=document.getElementById('cf-type').value;
