<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecOpsHQ</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg0:#060a14;--bg1:#0b1020;--bg2:#10162e;--bg2h:#151d3a;--bg3:#192244;
--brd:#1a2650;--brdh:#283a6e;
--t1:#edf0f7;--t2:#a8b2cc;--t3:#6b7a9a;--t4:#3d4e6e;
--ac:#4f6cf7;--acg:#4f6cf740;--acs:#4f6cf720;--acl:#6b84ff;
--red:#ef4444;--reds:#ef444418;--amb:#f59e0b;--ambs:#f59e0b18;
--grn:#22c55e;--grns:#22c55e18;--pnk:#ec4899;--pnks:#ec489918;
--vio:#8b5cf6;--vios:#8b5cf618;--blu:#3b82f6;--blus:#3b82f618;
--r:10px;--rl:14px;
--fs:'Outfit',system-ui,sans-serif;--fm:'IBM Plex Mono',monospace;
--glass:rgba(16,22,46,.7);
--sb-width:250px;
}
[data-theme="light"]{
--bg0:#f4f6fb;--bg1:#ffffff;--bg2:#eef1f8;--bg2h:#e4e8f4;--bg3:#d8ddef;
--brd:#d0d5e4;--brdh:#b8bfd4;
--t1:#141a30;--t2:#3a4260;--t3:#687098;--t4:#a0a8c0;
--ac:#4f6cf7;--acg:#4f6cf730;--acs:#4f6cf712;--acl:#3b5ae0;
--red:#dc2626;--reds:#dc262610;--amb:#d97706;--ambs:#d9770610;
--grn:#16a34a;--grns:#16a34a10;--pnk:#db2777;--pnks:#db277710;
--vio:#7c3aed;--vios:#7c3aed10;--blu:#2563eb;--blus:#2563eb10;
--glass:rgba(255,255,255,.85);
}
html{font-size:16px;scroll-behavior:smooth}
[data-theme="light"] body::before,[data-theme="light"] body::after,[data-theme="light"] main::before,[data-theme="light"] main::after{display:none}
[data-theme="light"] .sb-brand .ic{box-shadow:0 2px 8px rgba(79,108,247,.2)}
[data-theme="light"] .ni.act{color:#3b5ae0}
[data-theme="light"] .badge-ai{background:#dbeafe;color:#2563eb;border-color:#93c5fd40}
[data-theme="light"] .badge-infosec{background:#fee2e2;color:#dc2626;border-color:#fca5a540}
[data-theme="light"] .badge-draft{background:#e0e7ff;color:#4338ca;border-color:#a5b4fc40}
[data-theme="light"] .badge-review{background:#fef3c7;color:#92400e;border-color:#fcd34d40}
[data-theme="light"] .badge-approved{background:#dcfce7;color:#166534;border-color:#86efac40}
[data-theme="light"] .badge-critical{background:#fee2e2;color:#dc2626;border-color:#fca5a540}
[data-theme="light"] .badge-high{background:#ffedd5;color:#c2410c;border-color:#fdba7440}
[data-theme="light"] .badge-medium{background:#fef3c7;color:#92400e;border-color:#fcd34d40}
[data-theme="light"] .badge-low{background:#dcfce7;color:#166534;border-color:#86efac40}
[data-theme="light"] .ar-role{background:#e0e7ff;color:#3b5ae0;border-color:#a5b4fc30}
[data-theme="light"] .ar-tool{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd30}
[data-theme="light"] .ar-is{background:#fee2e2;color:#dc2626;border-color:#fca5a530}
[data-theme="light"] .isb{background:#fef2f2;border-color:#fecaca}
[data-theme="light"] .ist{color:#dc2626}
[data-theme="light"] .isi .isd{background:#dc2626}
[data-theme="light"] .confirm-overlay{background:rgba(0,0,0,.3)}
[data-theme="light"] .confirm-box{background:#fff;border-color:#d0d5e4}
[data-theme="light"] .guide-tip{background:#eef2ff;color:#4338ca;border-color:#c7d2fe}
[data-theme="light"] .tc{background:#eef2ff;border-color:#c7d2fe40}
[data-theme="light"] .tc b{color:#1a1f36}
[data-theme="light"] .nt{background:#e0e7ff;color:#4338ca;border-color:#a5b4fc40}
[data-theme="light"] .nt.off{background:#f1f5f9;color:#94a3b8;border-color:#cbd5e140}
[data-theme="light"] .dot-on{background:#dcfce7;color:#16a34a;border-color:#86efac}
[data-theme="light"] .dot-warn{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
[data-theme="light"] .pbar{background:#e0e7ff}
[data-theme="light"] .toast{background:#1a1f36;color:#f4f6fb}
[data-theme="light"] .sb-ft .vl{color:#4f6cf7}
[data-theme="light"] .theme-toggle svg{stroke:var(--t2)}
[data-theme="light"] .ni.act{color:#3b5ae0;background:#e0e7ff;border-color:#a5b4fc30}
[data-theme="light"] .ni.act::before{background:linear-gradient(180deg,#4f6cf7,#7c3aed)}
[data-theme="light"] .nt-0{background:#e0e7ff;color:#4338ca;border-color:#a5b4fc30}
[data-theme="light"] .nt-1{background:#fef3c7;color:#92400e;border-color:#fcd34d30}
[data-theme="light"] .nt-2{background:#fee2e2;color:#dc2626;border-color:#fca5a530}
[data-theme="light"] .nt-3{background:#fce7f3;color:#be185d;border-color:#f9a8d430}
[data-theme="light"] .nt-4{background:#dcfce7;color:#166534;border-color:#86efac30}
[data-theme="light"] .nt-5{background:#f3e8ff;color:#6b21a8;border-color:#c4b5fd30}
[data-theme="light"] .badge-ai{background:#e0e7ff;color:#4338ca;border-color:#a5b4fc30}
[data-theme="light"] .genb{box-shadow:0 4px 15px rgba(79,108,247,.2)}
[data-theme="light"] .inp:focus{box-shadow:0 0 0 3px rgba(79,108,247,.12)}
[data-theme="light"] .guide-tip{background:#eef2ff;color:#4338ca;border-color:#c7d2fe}
[data-theme="light"] .mo .md{background:#fff;border-color:#d0d5e4;box-shadow:0 24px 80px rgba(0,0,0,.12)}
[data-theme="light"] .export-menu{background:#fff;border-color:#d0d5e4;box-shadow:0 12px 40px rgba(0,0,0,.1)}
.badge-fw{font-size:.62rem;padding:1px 6px;background:var(--vios);color:#c4b5fd;border:1px solid #8b5cf620;border-radius:14px;font-weight:600;text-transform:uppercase;letter-spacing:.2px}
[data-theme="light"] .badge-fw{background:#f3e8ff;color:#6b21a8;border-color:#c4b5fd30}
body{font-family:var(--fs);background:var(--bg0);color:var(--t1);height:100vh;overflow:hidden;display:flex;-webkit-text-size-adjust:100%}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:9px}::-webkit-scrollbar-thumb:hover{background:var(--brdh)}

/* ===== SIDEBAR ===== */
.sb{width:var(--sb-width);background:var(--bg1);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s cubic-bezier(.4,0,.2,1),transform .25s cubic-bezier(.4,0,.2,1);position:relative;z-index:10}
.sb.collapsed{width:56px}
.sb.collapsed .sb-brand h1,.sb.collapsed .sb-brand p,.sb.collapsed .ni span,.sb.collapsed .sb-ft .lb,.sb.collapsed .sb-ft .vl{opacity:0;width:0;overflow:hidden;white-space:nowrap}
.sb.collapsed .sec-hdr,.sb.collapsed .pin-sec .sec-hdr{display:none}
.sb.collapsed .sec-count{display:none}
.sb.collapsed .sb-brand{padding:18px 11px;gap:0;justify-content:center}
.sb.collapsed .ni{padding:8px;justify-content:center}
.sb.collapsed .ni.act::before{left:-11px}
.sb-toggle{position:absolute;top:18px;right:-12px;width:24px;height:24px;background:var(--bg2);border:1px solid var(--brd);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:11;transition:all .2s}
.sb-toggle:hover{background:var(--ac);border-color:var(--ac)}
.sb-toggle:hover svg{stroke:#fff}
.sb-toggle svg{transition:transform .25s}
.sb.collapsed .sb-toggle svg{transform:rotate(180deg)}
.sb-brand{padding:18px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;transition:all .25s}
.sb-brand .ic{width:34px;height:34px;background:linear-gradient(135deg,var(--ac),#7c5cf6);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 12px var(--acg)}
.sb-brand .ic svg{stroke:#fff;width:18px;height:18px}
.sb-brand h1{font-size:.85rem;font-weight:700;line-height:1.2;transition:opacity .15s}
.sb-brand p{font-family:var(--fm);font-size:.65rem;color:var(--t3);letter-spacing:.5px;transition:opacity .15s}
.theme-toggle{margin-left:auto;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;border:1px solid transparent}
.theme-toggle:hover{background:var(--bg2);border-color:var(--brd)}
.sb.collapsed .theme-toggle{display:none}
.sb nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--brd) transparent}
.sb nav::-webkit-scrollbar{width:4px}.sb nav::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}.sb nav::-webkit-scrollbar-track{background:transparent}
.ni .tip{position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);background:var(--bg0);color:var(--t1);padding:6px 10px;border-radius:8px;font-size:.65rem;font-weight:500;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s,transform .15s;transform:translateY(-50%) translateX(-4px);z-index:999;border:1px solid var(--brd);box-shadow:0 4px 12px rgba(0,0,0,.3);line-height:1.4;max-width:220px;white-space:normal}
.ni .tip::before{content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:var(--brd)}
.ni:hover .tip{opacity:1;transform:translateY(-50%) translateX(0)}
.sec-hdr{display:flex;align-items:center;gap:6px;padding:6px 12px 4px;font-size:.68rem;font-weight:700;color:var(--t4);letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;user-select:none;transition:color .15s;margin-top:4px}
.sec-hdr:hover{color:var(--t2)}
.sec-hdr svg{transition:transform .2s;flex-shrink:0}
.sec-hdr.collapsed svg{transform:rotate(-90deg)}
.sec-hdr .sec-count{font-size:.6rem;font-weight:500;color:var(--t4);background:var(--bg1);padding:0 5px;border-radius:8px;margin-left:auto;letter-spacing:0}
.sec-body.collapsed{display:none}
.pin-sec{border-bottom:1px solid var(--b2);padding-bottom:2px;margin-bottom:2px}
.pin-sec .sec-hdr{color:var(--p);font-size:.65rem;margin-top:0}
.ni .pin-btn{opacity:0;position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--t3);padding:2px;border-radius:3px;transition:opacity .15s,color .15s;line-height:0}
.ni:hover .pin-btn{opacity:.7}
.ni .pin-btn:hover{opacity:1;color:var(--p)}
.ni .pin-btn.pinned{opacity:.8;color:var(--p)}
.role-badge{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--bg1);color:var(--t3);border:1px solid var(--b2);cursor:pointer;transition:all .15s}
.role-badge:hover{border-color:var(--p);color:var(--p)}
.ni{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);font-size:.8rem;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;border:1px solid transparent;position:relative}
.ni:hover{background:var(--bg2);color:var(--t1)}
.ni.act{background:var(--acs);color:#a5b4fc;border-color:#4f6cf725}
.ni.act::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:14px;background:linear-gradient(180deg,var(--ac),#8b5cf6);border-radius:0 3px 3px 0}
.ni svg{width:15px;height:15px;flex-shrink:0}
.ni span{transition:opacity .15s}
.sb-ft{padding:10px;border-top:1px solid var(--brd);overflow:hidden}
.ni[onclick*="showGuide"]{margin-top:auto;border-top:1px solid var(--brd);padding-top:8px}

/* Guide modal */
.guide-content{max-height:65vh;overflow-y:auto;padding-right:4px}
.guide-content::-webkit-scrollbar{width:4px}
.guide-content::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}
.guide-section{margin-bottom:16px}
.guide-section h3{font-size:.82rem;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;color:var(--t1)}
.guide-section p{font-size:.72rem;color:var(--t2);line-height:1.6;margin-bottom:4px}
.guide-step{display:flex;gap:8px;padding:6px 0;align-items:flex-start}
.guide-num{width:20px;height:20px;border-radius:50%;background:var(--acs);color:var(--ac);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0;margin-top:1px}
.guide-step-text{font-size:.72rem;color:var(--t2);line-height:1.5}
.guide-step-text b{color:var(--t1);font-weight:600}
.guide-tip{padding:8px 10px;background:var(--acs);border:1px solid #4f6cf718;border-radius:var(--r);font-size:.68rem;color:#a5b4fc;margin:6px 0;line-height:1.5;display:flex;gap:6px;align-items:flex-start}
.guide-tip svg{flex-shrink:0;margin-top:1px}
.guide-kbd{display:inline-flex;padding:1px 5px;background:var(--bg1);border:1px solid var(--brd);border-radius:4px;font-family:var(--fm);font-size:.65rem;color:var(--t3);vertical-align:middle;margin:0 1px}
.sb-ft .card{padding:10px}
.sb-ft .lb{font-family:var(--fm);font-size:.62rem;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;transition:opacity .15s}
.sb-ft .vl{font-size:.72rem;font-weight:600;color:#a5b4fc;margin-top:1px;transition:opacity .15s}

/* ===== MAIN ===== */
main{flex:1;overflow-y:auto;padding:24px 32px;position:relative;line-height:1.6;-webkit-overflow-scrolling:touch}
main::before{content:'';position:fixed;top:-120px;right:-120px;width:500px;height:500px;background:radial-gradient(circle,#4f6cf718 0%,transparent 70%);pointer-events:none}
main::after{content:'';position:fixed;bottom:-200px;left:-100px;width:400px;height:400px;background:radial-gradient(circle,#8b5cf610 0%,transparent 70%);pointer-events:none}
.page{display:none;position:relative;z-index:1;animation:fi .25s cubic-bezier(.4,0,.2,1);max-width:1080px}
.page.vis{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeScale{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

h1.pt{font-size:1.6rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:9px}
.ps{font-size:1rem;color:var(--t2);margin-bottom:20px}

.card{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rl);transition:all .2s}
.card:hover{border-color:var(--brdh)}

.badge{display:inline-flex;padding:3px 8px;font-size:.68rem;font-weight:600;border-radius:16px;border:1px solid;text-transform:uppercase;letter-spacing:.2px}
.badge-draft{background:var(--ambs);color:var(--amb);border-color:#f59e0b25}
.badge-review{background:var(--blus);color:var(--blu);border-color:#3b82f625}
.badge-approved{background:var(--grns);color:var(--grn);border-color:#22c55e25}
.badge-infosec{background:var(--reds);color:var(--red);border-color:#ef444425}
.badge-low{background:var(--grns);color:var(--grn);border-color:#22c55e25}
.badge-medium{background:var(--ambs);color:var(--amb);border-color:#f59e0b25}
.badge-high{background:var(--reds);color:var(--red);border-color:#ef444425}
.badge-critical{background:#dc262620;color:#fca5a5;border-color:#dc262640}
.badge-ai{background:var(--acs);color:#a5b4fc;border-color:#4f6cf725}

.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;font-size:.85rem;font-weight:600;border-radius:var(--r);cursor:pointer;transition:all .2s;border:1px solid transparent;font-family:var(--fs)}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{background:#5f7af8;box-shadow:0 4px 20px var(--acg);transform:translateY(-1px)}
.btn-s{background:var(--bg3);color:var(--t2);border-color:var(--brd)}.btn-s:hover{background:var(--bg2h);color:var(--t1)}
.btn-d{background:var(--reds);color:var(--red);border-color:#ef444425}
.btn-g{background:transparent;color:var(--t3);padding:3px 6px;border:none;cursor:pointer;border-radius:6px;transition:all .15s}.btn-g:hover{color:var(--t1);background:var(--bg3)}
.btn-sm{padding:4px 9px;font-size:.65rem}

.inp{width:100%;padding:10px 14px;background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r);color:var(--t1);font-size:max(.95rem,16px);font-family:var(--fs);transition:all .2s;outline:none}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px #4f6cf718}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;min-height:70px;line-height:1.5}
.lbl{font-family:var(--fm);font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:4px;display:block}

/* Phase tags */
.nt{display:inline-flex;padding:3px 9px;font-size:.78rem;font-weight:600;border-radius:16px;border:1px solid;letter-spacing:.2px;cursor:pointer;transition:all .15s;user-select:none}
.nt.off{background:var(--bg1)!important;color:var(--t3)!important;border-color:var(--brd)!important;opacity:.4}
.nt-0{background:#6366f118;color:#a5b4fc;border-color:#6366f125}
.nt-1{background:#f59e0b18;color:#fcd34d;border-color:#f59e0b25}
.nt-2{background:#ef444418;color:#fca5a5;border-color:#ef444425}
.nt-3{background:#ec489918;color:#f9a8d4;border-color:#ec489925}
.nt-4{background:#22c55e18;color:#86efac;border-color:#22c55e25}
.nt-5{background:#8b5cf618;color:#c4b5fd;border-color:#8b5cf625}

.fb{display:flex;justify-content:space-between;align-items:center}
.fc{display:flex;align-items:center}
.g2{gap:4px}.g3{gap:6px}.g4{gap:10px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:14px}.mb4{margin-bottom:20px}
.mt2{margin-top:8px}.mt3{margin-top:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Capability tags */
.cap{display:inline-flex;padding:2px 7px;font-size:.65rem;font-weight:600;border-radius:16px;background:var(--bg1);color:var(--t2);border:1px solid var(--brd);margin:1px;transition:all .15s}
.cap-active{background:var(--acs);color:#a5b4fc;border-color:#4f6cf725}
.cap-sel{cursor:pointer}.cap-sel:hover{border-color:var(--brdh)}
.cap-sel.off{opacity:.35}

/* Coverage matrix */
.matrix{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:8px}
.matrix th{padding:7px 10px;text-align:left;font-weight:600;color:var(--t3);font-family:var(--fm);font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--brd)}
.matrix td{padding:6px 10px;border-bottom:1px solid #1a2040}
.matrix .name{font-weight:600;font-size:.85rem;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.matrix .dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:.75rem;transition:all .2s}
.dot-on{background:var(--acs);color:var(--ac)}
.dot-off{background:var(--bg1);color:var(--t4)}
.dot-warn{background:var(--ambs);color:var(--amb)}
.matrix-header-cell{text-align:center!important;font-size:.75rem!important}

/* Phase cards in detail */
.pc{border-left:3px solid;margin-bottom:7px;overflow:hidden}
.pc[data-p="0"]{border-left-color:#6366f1}.pc[data-p="1"]{border-left-color:#f59e0b}
.pc[data-p="2"]{border-left-color:#ef4444}.pc[data-p="3"]{border-left-color:#ec4899}
.pc[data-p="4"]{border-left-color:#22c55e}.pc[data-p="5"]{border-left-color:#8b5cf6}
.ph{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .15s}
.ph:hover{background:var(--bg2h)}
.phi{display:flex;align-items:center;gap:7px}
.phn{font-weight:600;font-size:.8rem}.phm{font-size:.6rem;color:var(--t3);margin-top:1px}
.pb{padding:0 14px 14px;border-top:1px solid var(--brd);display:none}.pb.open{display:block;animation:fi .2s}
.phs{margin-top:10px}
.st{font-family:var(--fm);font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.st svg{width:10px;height:10px}

.tc{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r);font-size:.85rem;margin:1px}
.tc b{font-weight:600}.tc span{color:var(--t3);font-size:.82rem}
.tb{padding:7px;background:var(--bg1);border-radius:var(--r);border:1px solid var(--brd)}
.tb .tn{font-size:.72rem;font-weight:600;margin-bottom:1px}
.tb .rl{font-size:.62rem;color:var(--t3);padding-left:6px;line-height:1.5}
.tb .rl b{color:var(--t2);font-weight:500}

.ai{display:flex;gap:6px;align-items:flex-start;padding:4px 0;border-radius:6px;transition:background .1s}
.ai:hover{background:#ffffff04}
.ai:hover .act-btns{opacity:1}
.an{width:17px;height:17px;border-radius:50%;background:var(--bg1);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:600;color:var(--t3);flex-shrink:0;margin-top:2px}
.at{font-size:.72rem;color:var(--t2);line-height:1.5;flex:1}
.at.esc{color:var(--red);font-weight:600}
.ar{font-size:.65rem;display:inline-flex;padding:1px 5px;border-radius:10px;margin-right:3px;font-weight:600}
.ar-role{background:var(--blus);color:var(--blu);border:1px solid #3b82f618}
.ar-tool{background:var(--ambs);color:var(--amb);border:1px solid #f59e0b18}
.ar-is{background:var(--reds);color:var(--red);border:1px solid #ef444418}

.act-btns{opacity:0;transition:opacity .15s;display:flex;gap:1px;flex-shrink:0}

.isb{padding:10px;background:#ef44440a;border:1px solid #ef444418;border-radius:var(--r);margin-top:10px}
.ist{font-family:var(--fm);font-size:.63rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--red);margin-bottom:4px}
.isi{display:flex;gap:5px;align-items:flex-start;padding:2px 0}
.isd{width:4px;height:4px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:5px}
.isi p{font-size:.7rem;color:#fca5a5;line-height:1.3}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:50;display:none;align-items:center;justify-content:center}
.mo.open{display:flex}
.md{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:22px;width:540px;max-width:92vw;max-height:82vh;overflow-y:auto;animation:fadeScale .2s cubic-bezier(.4,0,.2,1);box-shadow:0 24px 80px rgba(0,0,0,.5)}
.md h2{font-size:.9rem;font-weight:700;margin-bottom:14px}
.md .fr{margin-bottom:9px}

/* Confirm dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:60;display:flex;align-items:center;justify-content:center;animation:fi .15s}
.confirm-box{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:22px;width:380px;max-width:90vw;box-shadow:0 24px 80px rgba(0,0,0,.5);animation:fadeScale .2s}
.confirm-box h3{font-size:.88rem;font-weight:700;margin-bottom:6px}
.confirm-box p{font-size:.75rem;color:var(--t2);margin-bottom:16px;line-height:1.4}
.confirm-box .fc{justify-content:flex-end}

/* Gen */
.gb{padding:18px;border-radius:var(--rl);background:linear-gradient(135deg,#10162e,#1a1f4a);border:1px solid var(--brd);cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.gb::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,#4f6cf708 60%,transparent 80%);background-size:200% 200%;animation:shimmer 6s ease infinite;pointer-events:none}
.gb:hover{border-color:var(--ac);box-shadow:0 6px 32px var(--acg);transform:translateY(-2px)}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.ec{padding:12px 14px;border-radius:var(--r);background:var(--bg1);border:1px solid var(--brd);cursor:pointer;transition:all .2s}
.ec:hover{border-color:var(--ac);background:var(--bg2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.ec h4{font-size:.95rem;font-weight:600;margin-bottom:3px}.ec p{font-size:.82rem;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.genb{width:100%;padding:16px;background:linear-gradient(135deg,var(--ac),#6b5cf7);color:#fff;border:none;border-radius:var(--rl);font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .3s;font-family:var(--fs);display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden}
.genb::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transform:translateX(-100%);transition:transform .6s}
.genb:hover::before{transform:translateX(100%)}
.genb:hover{box-shadow:0 5px 28px var(--acg);transform:translateY(-1px)}.genb:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;transform:none}

.sevs{display:flex;gap:4px}
.sev{padding:8px 16px;border-radius:var(--r);font-size:.88rem;font-weight:600;cursor:pointer;border:1px solid var(--brd);background:var(--bg1);color:var(--t3);transition:all .2s}
.sev:hover{border-color:var(--brdh)}
.sev.on[data-s="low"]{background:var(--grns);color:var(--grn);border-color:#22c55e35}
.sev.on[data-s="medium"]{background:var(--ambs);color:var(--amb);border-color:#f59e0b35}
.sev.on[data-s="high"]{background:var(--reds);color:var(--red);border-color:#ef444435}
.sev.on[data-s="critical"]{background:#dc262625;color:#fca5a5;border-color:#dc262645}

/* Stats */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:20px}
.sc{padding:14px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}.sc:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3)}
.sc::after{content:'';position:absolute;top:0;right:0;width:50px;height:50px;background:radial-gradient(circle,currentColor 0%,transparent 70%);opacity:.03;pointer-events:none}
.si{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:7px}
.sv{font-size:1.3rem;font-weight:700;line-height:1}.sl{font-size:.68rem;color:var(--t2);margin-top:1px}

.prg{padding:16px;text-align:center}
.prg .pl{font-size:.75rem;font-weight:600;color:var(--ac);margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:6px}
.prg .pp{font-size:.68rem;color:var(--t2);animation:pulse 1.5s ease infinite}
.pbar{height:3px;background:var(--bg1);border-radius:3px;overflow:hidden;margin-top:7px}
.pfill{height:100%;background:linear-gradient(90deg,var(--ac),#8b5cf6,var(--ac));background-size:200% 100%;animation:shimmer 2s linear infinite;border-radius:3px;transition:width .4s ease}

/* Coverage section */
.cov-section{margin-bottom:16px}
.cov-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .15s}
.cov-header:hover{background:var(--bg2)}
.cov-header h3{font-size:.95rem;font-weight:600;display:flex;align-items:center;gap:6px}
.cov-body{display:none;padding:8px 14px 12px;border-top:1px solid var(--brd)}
.cov-body.open{display:block;animation:fi .15s}
.cov-warn{display:flex;align-items:center;gap:5px;padding:10px 14px;background:var(--ambs);border:1px solid #f59e0b25;border-radius:var(--r);font-size:.88rem;color:var(--amb);margin-top:8px}
.cov-ok{display:flex;align-items:center;gap:5px;padding:10px 14px;background:var(--grns);border:1px solid #22c55e25;border-radius:var(--r);font-size:.88rem;color:var(--grn);margin-top:8px}

.spinner{width:14px;height:14px;border:2px solid var(--brd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
.spinw{border-color:rgba(255,255,255,.2);border-top-color:#fff}
.empty{text-align:center;padding:40px 16px;color:var(--t3)}
.empty svg{margin-bottom:10px;opacity:.3}
.hint{font-size:.85rem;color:var(--t3);margin-top:4px}
.toast{position:fixed;bottom:16px;right:16px;padding:10px 16px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rl);font-size:.72rem;font-weight:500;z-index:100;transform:translateY(60px);opacity:0;transition:all .35s cubic-bezier(.16,1,.3,1);box-shadow:0 8px 30px rgba(0,0,0,.4);display:flex;align-items:center;gap:6px}
.toast.show{transform:translateY(0);opacity:1}.toast.ok{border-color:#22c55e30;color:var(--grn)}

.phase-assign{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.impact-note{font-size:.6rem;color:var(--ac);padding:6px 10px;background:var(--acs);border:1px solid #4f6cf718;border-radius:var(--r);margin-top:8px;display:flex;align-items:center;gap:5px}

/* Detail header bar */
.detail-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:16px;padding:10px 14px;background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r);font-size:.65rem;color:var(--t3)}
.detail-meta .sep{width:1px;height:14px;background:var(--brd)}

/* Export dropdown */
.export-wrap{position:relative;display:inline-flex}
.export-menu{position:absolute;top:100%;right:0;margin-top:4px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:4px;min-width:160px;box-shadow:0 12px 40px rgba(0,0,0,.4);display:none;z-index:5;animation:fi .12s}
.export-menu.open{display:block}
.export-item{display:flex;align-items:center;gap:6px;padding:6px 10px;font-size:.7rem;color:var(--t2);cursor:pointer;border-radius:6px;transition:all .12s}
.export-item:hover{background:var(--bg2h);color:var(--t1)}

/* Keyboard shortcut hint */
.kbd{display:inline-flex;padding:1px 5px;background:var(--bg1);border:1px solid var(--brd);border-radius:4px;font-family:var(--fm);font-size:.62rem;color:var(--t3);margin-left:auto}

/* Filter tabs */
.filter-tabs{display:flex;gap:2px;margin-bottom:14px;padding:2px;background:var(--bg1);border-radius:var(--r);border:1px solid var(--brd);width:fit-content}
.filter-tab{padding:5px 12px;font-size:.7rem;font-weight:500;color:var(--t3);cursor:pointer;border-radius:8px;transition:all .15s}
.filter-tab:hover{color:var(--t2)}
.filter-tab.active{background:var(--bg2);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* Search */
.search-bar{position:relative;margin-bottom:12px}
.search-bar input{padding-left:30px}
.search-bar svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
/* Templates */
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:12px}
.tpl-card{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.tpl-card:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,108,247,.15)}
.tpl-badge{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;letter-spacing:.5px;padding:2px 8px;border-radius:6px;text-transform:uppercase}
.tpl-badge.critical{background:#ef444420;color:#ef4444}.tpl-badge.high{background:#f59e0b20;color:#f59e0b}
.tpl-badge.medium{background:#3b82f620;color:#3b82f6}.tpl-badge.low{background:#22c55e20;color:#22c55e}
/* Analytics */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin:16px 0}
.stat-card{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:16px;text-align:center}
.stat-val{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--ac),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-lbl{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.chart-bar{display:flex;align-items:end;gap:6px;height:120px;margin:12px 0;padding:8px 0;border-bottom:1px solid var(--bd)}
.chart-bar .bar{flex:1;border-radius:6px 6px 0 0;min-width:20px;position:relative;transition:height .3s;cursor:pointer}
.chart-bar .bar:hover{filter:brightness(1.2)}.chart-bar .bar span{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:.58rem;color:var(--t3);white-space:nowrap}
/* Settings */
.settings-section{background:var(--c1);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:12px}
.settings-section h3{font-size:.95rem;font-weight:700;color:var(--t1);margin-bottom:4px}
.settings-section p{font-size:.85rem;color:var(--t3);margin-bottom:12px}
.settings-input{width:100%;padding:10px 14px;background:var(--c0);border:1px solid var(--bd);border-radius:8px;color:var(--t1);font-size:max(.85rem,16px);font-family:'IBM Plex Mono',monospace}
.settings-input:focus{outline:none;border-color:var(--ac)}
.settings-btn{padding:8px 18px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
/* Execution */
.exec-header{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;border-radius:12px;padding:20px;margin-bottom:16px}
.exec-header.completed{background:linear-gradient(135deg,#22c55e,#16a34a)}
.exec-header.paused{background:linear-gradient(135deg,#f59e0b,#d97706)}
.exec-phase{background:var(--c1);border:1px solid var(--bd);border-radius:12px;margin-bottom:12px;overflow:hidden}
.exec-phase-head{padding:12px 16px;font-weight:700;font-size:.7rem;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.exec-action{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--bd);font-size:.6rem;transition:background .15s}
.exec-action:last-child{border-bottom:none}
.exec-action.done{opacity:.6;text-decoration:line-through}
.exec-check{width:18px;height:18px;border-radius:6px;border:2px solid var(--bd);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.exec-check:hover{border-color:var(--ac)}.exec-check.checked{background:var(--ac);border-color:var(--ac)}
.exec-timer{font-family:'IBM Plex Mono',monospace;font-size:1.5rem;font-weight:800;color:white}
.exec-sla{font-size:.65rem;padding:2px 8px;border-radius:6px;font-weight:600}
.exec-sla.ok{background:#22c55e20;color:#22c55e}.exec-sla.warn{background:#f59e0b20;color:#f59e0b}.exec-sla.breach{background:#ef444420;color:#ef4444}
/* Compliance */
.comp-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.comp-tag{font-size:.62rem;padding:2px 8px;border-radius:6px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid}
.comp-tag.soc2{background:#6366f120;color:#6366f1;border-color:#6366f130}.comp-tag.iso{background:#f59e0b20;color:#f59e0b;border-color:#f59e0b30}
.comp-tag.nistcsf{background:#22c55e20;color:#22c55e;border-color:#22c55e30}.comp-tag.active{opacity:1;box-shadow:0 0 0 2px var(--ac)}.comp-tag.inactive{opacity:.4}
/* Search */
.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:10px 14px 10px 34px;background:var(--c1);border:1px solid var(--bd);border-radius:10px;color:var(--t1);font-size:.85rem}
.search-box input:focus{outline:none;border-color:var(--ac)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--t3)}
/* Version History */
.ver-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--bd);font-size:.6rem}
.ver-item:last-child{border-bottom:none}
.ver-num{font-weight:700;color:var(--ac);font-family:'IBM Plex Mono',monospace}
/* RACI */
.raci-table{width:100%;border-collapse:collapse;font-size:.65rem;margin-top:8px}
.raci-table th,.raci-table td{padding:6px 8px;border:1px solid var(--bd);text-align:center}
.raci-table th{background:var(--c1);font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);font-size:.62rem}
.raci-r{color:#6366f1;font-weight:700}.raci-a{color:#ef4444;font-weight:700}.raci-c{color:#f59e0b;font-weight:700}.raci-i{color:#22c55e;font-weight:700}
/* Drill Mode */
.drill-header{background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border-radius:12px;padding:20px;margin-bottom:16px}
.inject-card{background:#f59e0b15;border:2px solid #f59e0b40;border-radius:12px;padding:14px;margin:10px 0;animation:injectPulse 2s ease infinite}
@keyframes injectPulse{0%,100%{border-color:#f59e0b40}50%{border-color:#f59e0b}}
.inject-card h4{color:#f59e0b;font-size:.7rem;font-weight:700;margin-bottom:4px}
.drill-score{font-size:2.5rem;font-weight:900;text-align:center;margin:12px 0}
.drill-score.excellent{color:#22c55e}.drill-score.good{color:#3b82f6}.drill-score.fair{color:#f59e0b}.drill-score.poor{color:#ef4444}
/* Audit Log */
.audit-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--bd);font-size:.6rem}
.audit-action{font-weight:700;padding:2px 8px;border-radius:6px;font-size:.62rem;text-transform:uppercase;letter-spacing:.5px}
.audit-action.create{background:#22c55e20;color:#22c55e}.audit-action.update{background:#3b82f620;color:#3b82f6}
.audit-action.delete{background:#ef444420;color:#ef4444}.audit-action.execute{background:#f59e0b20;color:#f59e0b}
/* Comments */
.comment-thread{border-left:3px solid var(--ac);padding-left:12px;margin:8px 0}
.comment-item{padding:6px 0;border-bottom:1px solid var(--bd)}
.comment-item:last-child{border-bottom:none}
.comment-author{font-size:.65rem;font-weight:700;color:var(--ac)}.comment-time{font-size:.58rem;color:var(--t3);margin-left:8px}
.comment-text{font-size:.6rem;color:var(--t2);margin-top:2px;line-height:1.5}
.comment-input{display:flex;gap:6px;margin-top:8px}
.comment-input input{flex:1;padding:6px 10px;background:var(--c0);border:1px solid var(--bd);border-radius:8px;color:var(--t1);font-size:.6rem}
/* Maturity */
.maturity-ring{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.maturity-val{font-size:1.8rem;font-weight:900;color:white}
/* ATT&CK Heatmap */
.attack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px;margin:12px 0}
.attack-cell{padding:6px 4px;border-radius:6px;text-align:center;font-size:.58rem;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid transparent}
.attack-cell:hover{transform:scale(1.05)}.attack-cell.covered{background:#22c55e20;color:#22c55e;border-color:#22c55e30}
.attack-cell.partial{background:#f59e0b20;color:#f59e0b;border-color:#f59e0b30}.attack-cell.gap{background:#ef444410;color:#ef4444;border-color:#ef444420}
/* Knowledge Base */
.kb-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--c1);border:1px solid var(--bd);border-radius:8px;margin:4px 0;font-size:.6rem}
.kb-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem}
.kb-icon.doc{background:#3b82f620}.kb-icon.img{background:#22c55e20}.kb-icon.link{background:#f59e0b20}
/* Responsive */
/* === MOBILE HAMBURGER === */
.mob-toggle{display:none;position:fixed;top:12px;left:12px;z-index:25;width:40px;height:40px;border-radius:10px;background:var(--bg2);border:1px solid var(--brd);align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.mob-toggle svg{stroke:var(--t1)}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9;backdrop-filter:blur(2px)}

@media(max-width:768px){
/* Hamburger visible */
.mob-toggle{display:flex}
.mob-overlay.open{display:block}

/* Prevent iOS zoom on input focus */
input,select,textarea{font-size:max(inherit,16px)!important}

/* Sidebar: off-screen by default, overlay when open */
.sb{position:fixed!important;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:20;width:260px!important;box-shadow:4px 0 24px rgba(0,0,0,.4)}
.sb.mob-open{transform:translateX(0)}
.sb.collapsed{width:260px!important}
.sb.collapsed .sb-brand h1,.sb.collapsed .sb-brand p,.sb.collapsed .ni span,.sb.collapsed .sb-ft .lb,.sb.collapsed .sb-ft .vl{opacity:1;width:auto;overflow:visible}

/* Main content full width */
main{padding:16px!important;padding-top:60px!important}
.page{max-width:100%!important}

/* Page titles */
h1.pt{font-size:1.3rem}
.ps{font-size:.9rem}

/* Stat grids */
.sg{grid-template-columns:repeat(2,1fr)!important;gap:6px}

function getNavSections(){
  const sections=[];let cur={header:null,items:[]};
  NAV.forEach(n=>{
    if(n.sep||n.s){if(cur.items.length||cur.header)sections.push(cur);cur={header:n,items:[]};}
    else cur.items.push(n);
  });
  if(cur.items.length||cur.header)sections.push(cur);
  return sections;
}

function isNavVisible(id){
  const role=D.navRole||'all';
  if(ALWAYS_VISIBLE.includes(id))return true;
  if(role==='custom'){
    return!(D.hiddenNav||[]).includes(id);
  }
  const def=NAV_ROLES[role];
  if(!def||!def.items)return true; // all or admin = everything
  return def.items.includes(id);
}

function rNav(a){
  const pinned=(D.pinnedNav||[]).filter(id=>isNavVisible(id));
  const collapsed=new Set(D.collapsedSections||[]);
  const sections=getNavSections();
  let html='';

  // ── Pinned section
  if(pinned.length){
    html+=`<div class="pin-sec"><div class="sec-hdr" style="cursor:default"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> PINNED</div>`;
    pinned.forEach(id=>{
      const n=NAV.find(x=>x.id===id);
      if(!n)return;
      html+=`<div class="ni${n.id===a?' act':''}" onclick="${n.action||`go('${n.id}')`}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${n.i}</svg><span>${n.l}</span>${n.kbd?`<span class="kbd">${n.kbd}</span>`:''}<button class="pin-btn pinned" onclick="event.stopPropagation();togglePin('${n.id}')" title="Unpin"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button></div>`;
    });
    html+=`</div>`;
  }

  // ── Main sections (collapsible)
  sections.forEach((sec,si)=>{
    const visItems=sec.items.filter(n=>isNavVisible(n.id));
    if(!visItems.length&&sec.header)return;
    const secKey=sec.header?sec.header.l:'top';
    const isCollapsed=collapsed.has(secKey);
    if(sec.header){
      html+=`<div class="sec-hdr${isCollapsed?' collapsed':''}" onclick="toggleSection('${secKey}')"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>${sec.header.l}<span class="sec-count">${visItems.length}</span></div>`;
    }
    html+=`<div class="sec-body${isCollapsed?' collapsed':''}" data-sec="${secKey}">`;
    visItems.forEach(n=>{
      const isPinned=(D.pinnedNav||[]).includes(n.id);
      html+=`<div class="ni${n.id===a?' act':''}" onclick="${n.action||`go('${n.id}')`}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${n.i}</svg><span>${n.l}</span>${n.kbd?`<span class="kbd">${n.kbd}</span>`:''}${TIPS[n.id]?`<span class="tip">${TIPS[n.id]}</span>`:''}${!ALWAYS_VISIBLE.includes(n.id)?`<button class="pin-btn${isPinned?' pinned':''}" onclick="event.stopPropagation();togglePin('${n.id}')" title="${isPinned?'Unpin':'Pin to top'}"><svg width="11" height="11" viewBox="0 0 24 24" fill="${isPinned?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>`:''}</div>`;
    });
    html+=`</div>`;
  });

  document.getElementById('snav').innerHTML=html;
  // Update role badge
  const rl=document.getElementById('sb-role-label');
  if(rl)rl.textContent=NAV_ROLES[D.navRole||'all']?.label||'All Features';
}

function toggleSection(secKey){
  if(!D.collapsedSections)D.collapsedSections=[];
  const idx=D.collapsedSections.indexOf(secKey);
  if(idx>=0)D.collapsedSections.splice(idx,1);
  else D.collapsedSections.push(secKey);
  _s();
  rNav(_activePage);
}

function togglePin(id){
  if(!D.pinnedNav)D.pinnedNav=[];
  const idx=D.pinnedNav.indexOf(id);
  if(idx>=0)D.pinnedNav.splice(idx,1);
  else{if(D.pinnedNav.length>=8){toast('Max 8 pinned items','⚠️');return;}D.pinnedNav.push(id);}
  _s();
  rNav(_activePage);
}

// ── Role Switcher
function openRoleSwitcher(){
  const cur=D.navRole||'all';
  sModal(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div><h2>Sidebar Role</h2><p style="font-size:.78rem;color:var(--t3)">Choose a role to filter the sidebar to relevant features</p></div>
    <button class="btn-g" onclick="cModal()">${sv(IC.x,14)}</button></div>
  <div style="display:grid;gap:8px">
  ${Object.entries(NAV_ROLES).map(([key,r])=>{
    const count=r.items?r.items.length:NAV.filter(n=>!n.sep&&!n.s).length;
    const active=key===cur;
    return`<div style="padding:12px 16px;border:2px solid ${active?'var(--p)':'var(--b2)'};border-radius:10px;cursor:pointer;transition:all .15s;background:${active?'var(--bg1)':'transparent'}" onclick="setNavRole('${key}')" onmouseenter="this.style.borderColor='var(--p)'" onmouseleave="this.style.borderColor='${active?'var(--p)':'var(--b2)'}'"}>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-weight:700;font-size:.92rem">${r.label}</span>
        ${active?'<span style="font-size:.65rem;background:var(--p);color:#fff;padding:1px 6px;border-radius:4px">Active</span>':''}
        <span style="margin-left:auto;font-size:.72rem;color:var(--t3)">${count} items</span>
      </div>
      <p style="font-size:.78rem;color:var(--t3);margin:0">${r.desc}</p>
    </div>`;}).join('')}
  </div>
  <div style="margin-top:14px;padding:10px 12px;background:var(--bg1);border-radius:8px;font-size:.78rem;color:var(--t3)">
    💡 <b>Custom</b> mode uses the item-level toggles from the Customise panel. All other roles show a curated set — you can still pin favourites on top of any role.
  </div>`);
}

function setNavRole(role){
  D.navRole=role;
  _s();cModal();
  rNav(_activePage);
  toast('Sidebar: '+NAV_ROLES[role].label);
}

// ── Customiser (for Custom role — item-level toggles)
function openSidebarCustomiser(){
  const hidden=new Set(D.hiddenNav||[]);
  const sections=getNavSections();
  const totalItems=NAV.filter(n=>!n.sep&&!n.s).length;
  const visCount=totalItems-hidden.size;
  sModal(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div><h2>Customise Sidebar</h2><p style="font-size:.78rem;color:var(--t3)">Toggle individual items on/off • <span id="sb-vis-count">${visCount}</span>/${totalItems} visible</p></div>
    <button class="btn-g" onclick="cModal()">${sv(IC.x,14)}</button></div>
  ${D.navRole!=='custom'?`<div style="padding:8px 12px;background:var(--bg1);border-radius:8px;margin-bottom:12px;font-size:.78rem;color:var(--t3)">⚠️ Item toggles only apply in <b>Custom</b> mode. Current role: <b>${NAV_ROLES[D.navRole||'all']?.label}</b>. <button class="btn btn-sm btn-p" style="font-size:.7rem;padding:2px 8px;margin-left:6px" onclick="D.navRole='custom';_s();openSidebarCustomiser()">Switch to Custom</button></div>`:''}
  <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn btn-sm btn-p" onclick="D.hiddenNav=[];_s();openSidebarCustomiser()">Show All</button>
    <button class="btn btn-sm" onclick="sbQuickSet('essentials')">Essentials</button>
    <button class="btn btn-sm" onclick="sbQuickSet('analyst')">Analyst Set</button>
    <button class="btn btn-sm" onclick="sbQuickSet('lead')">Lead Set</button>
    <button class="btn btn-sm" onclick="sbQuickSet('ciso')">CISO Set</button>
  </div>
  <div style="max-height:50vh;overflow-y:auto;border:1px solid var(--b2);border-radius:8px">
  ${sections.map(sec=>{
    if(!sec.header&&!sec.items.length)return'';
    const secName=sec.header?sec.header.l:'Top Level';
    return`<div style="border-bottom:1px solid var(--b2)">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:var(--bg1)">
        <span style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3)">${secName}</span>
        <div style="display:flex;gap:4px">
          <button class="btn btn-sm" style="font-size:.6rem;padding:1px 5px" onclick="sbToggleSection('${secName}',true)">All</button>
          <button class="btn btn-sm" style="font-size:.6rem;padding:1px 5px" onclick="sbToggleSection('${secName}',false)">None</button>
        </div>
      </div>
      <div style="padding:4px 12px 6px;display:grid;grid-template-columns:1fr 1fr;gap:1px">
      ${sec.items.map(n=>{
        const locked=ALWAYS_VISIBLE.includes(n.id);
        const on=!hidden.has(n.id);
        return`<label style="display:flex;align-items:center;gap:5px;padding:3px 4px;border-radius:3px;cursor:${locked?'default':'pointer'};opacity:${locked?'.5':'1'};font-size:.76rem${on?'':';color:var(--t3)'}">
          <input type="checkbox" ${on?'checked':''} ${locked?'disabled':''} onchange="sbToggle('${n.id}',this.checked)" style="accent-color:var(--p);width:13px;height:13px">
          ${n.l}</label>`;}).join('')}
      </div></div>`;}).join('')}
  </div>
  <div style="margin-top:10px;display:flex;justify-content:flex-end">
    <button class="btn btn-p" onclick="cModal();rNav(_activePage)">Done</button>
  </div>`);
}

function sbToggle(id,show){
  if(!D.hiddenNav)D.hiddenNav=[];
  if(show)D.hiddenNav=D.hiddenNav.filter(x=>x!==id);
  else if(!D.hiddenNav.includes(id))D.hiddenNav.push(id);
  _s();
  const cnt=NAV.filter(n=>!n.sep&&!n.s).length-(D.hiddenNav||[]).length;
  const el=document.getElementById('sb-vis-count');if(el)el.textContent=cnt;
}
function sbToggleSection(secName,show){
  const sections=getNavSections();
  const sec=sections.find(s=>(s.header?s.header.l:'Top Level')===secName);
  if(!sec)return;
  sec.items.forEach(n=>{if(!ALWAYS_VISIBLE.includes(n.id))sbToggle(n.id,show);});
  openSidebarCustomiser();
}
function sbQuickSet(roleKey){
  const def=NAV_ROLES[roleKey];
  if(!def||!def.items){D.hiddenNav=[];_s();openSidebarCustomiser();return;}
  const keep=new Set(def.items);
  D.hiddenNav=NAV.filter(n=>!n.sep&&!n.s&&!keep.has(n.id)&&!ALWAYS_VISIBLE.includes(n.id)).map(n=>n.id);
  D.navRole='custom';
  _s();openSidebarCustomiser();
}
let _activePage='dashboard';

function toggleTheme(){
  const html=document.documentElement;
  const isLight=html.getAttribute('data-theme')==='light';
  html.setAttribute('data-theme',isLight?'dark':'light');
  updateThemeIcon();
  try{localStorage.setItem('pb-theme',isLight?'dark':'light')}catch(e){}
}
function updateThemeIcon(){
  const el=document.getElementById('theme-icon');
  if(!el)return;
  const isLight=document.documentElement.getAttribute('data-theme')==='light';
  el.innerHTML=isLight?MOON_ICON:SUN_ICON;
}

// Custom confirm dialog
function showConfirm(title,msg,onYes,yesLabel='Delete',yesClass='btn-d'){
  const el=document.createElement('div');
  el.className='confirm-overlay';
  el.innerHTML=`<div class="confirm-box"><h3>${title}</h3><p>${msg}</p><div class="fc g2"><button class="btn btn-s" id="conf-no">Cancel</button><button class="btn ${yesClass}" id="conf-yes">${yesLabel}</button></div></div>`;
  document.body.appendChild(el);
  el.querySelector('#conf-no').onclick=()=>el.remove();
  el.querySelector('#conf-yes').onclick=()=>{el.remove();onYes()};
  el.onclick=e=>{if(e.target===el)el.remove()};
}

// ===== HELPERS =====
function phTag(idx,on,onclick){const p=getPH()[idx];return`<span class="nt nt-${idx}${on?'':' off'}"${onclick?` onclick="${onclick}"`:''} title="${p.name}">${p.name}</span>`}
function allRoles(){return D.teams.flatMap(t=>t.roles.map(r=>({...r,team:t.name,teamId:t.id})))}
function rolesForPhase(pi){return allRoles().filter(r=>r.phases.includes(pi))}
function toolsForPhase(pi){return D.tools.filter(t=>t.phases.includes(pi))}
function coverage(){return getPH().map((_,i)=>({tools:toolsForPhase(i),roles:rolesForPhase(i)}))}
function gaps(){return coverage().map((c,i)=>({phase:getPH()[i],noTools:c.tools.length===0,noRoles:c.roles.length===0,idx:i})).filter(g=>g.noTools||g.noRoles)}

${D.teams.map(t=>`<div class="card" style="margin-bottom:7px"><div style="padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="document.getElementById('tb-${t.id}').classList.toggle('open')"><div><div style="font-weight:600;font-size:.82rem">${t.name} <span style="font-size:.75rem;color:var(--t3);font-weight:400">${t.roles.length} role${t.roles.length!==1?'s':''}</span></div><div style="font-size:.8rem;color:var(--t2)">${t.desc}</div></div><div class="fc g2" onclick="event.stopPropagation()"><button class="btn-g" onclick="tmModal('${t.id}')">${sv(IC.ed,12)}</button><button class="btn-g" style="color:var(--red)" onclick="showConfirm('Delete Team','Delete <b>${t.name}</b> and all its roles? This cannot be undone.',()=>{D.teams=D.teams.filter(x=>x.id!=='${t.id}');persist();toast('Team deleted');V.teams()})">${sv(IC.tr,12)}</button>${sv(IC.ch,13,'var(--t3)')}</div></div>
<div id="tb-${t.id}" class="pb"><div style="padding-top:8px"><div class="fb mb2"><div class="lbl" style="margin:0">Roles — phase assignments & capabilities drive playbook actions</div><button class="btn btn-sm btn-p" onclick="rlModal('${t.id}')">${sv(IC.pl,10)} Add Role</button></div>
${t.roles.map(r=>`<div class="card" style="padding:10px;margin-bottom:5px;background:var(--bg1)">
<div class="fb"><div style="font-size:.78rem;font-weight:600">${r.title}</div><div class="fc g2"><button class="btn-g" onclick="rlModal('${t.id}','${r.id}')">${sv(IC.ed,11)}</button><button class="btn-g" style="color:var(--red)" onclick="showConfirm('Delete Role','Delete <b>${r.title}</b>?',()=>{D.teams.find(x=>x.id==='${t.id}').roles=D.teams.find(x=>x.id==='${t.id}').roles.filter(x=>x.id!=='${r.id}');persist();toast('Role deleted');V.teams()})">${sv(IC.tr,11)}</button></div></div>
<div style="font-size:.78rem;color:var(--t3);margin:2px 0 5px">${r.resp}</div>

<div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:5px">${getPH().map((_,i)=>phTag(i,r.phases.includes(i),`toggleRP('${t.id}','${r.id}',${i})`)).join('')}</div>
<div class="lbl mb1">Capabilities <span style="font-weight:400;color:var(--t4)">— matched to action types</span></div>
<div style="display:flex;flex-wrap:wrap;gap:2px">${CAPS.map(c=>`<span class="cap cap-sel${r.caps.includes(c)?' cap-active':' off'}" onclick="toggleRC('${t.id}','${r.id}','${c}')">${c}</span>`).join('')}</div>
</div>`).join('')}
${t.roles.length===0?'<p style="font-size:.8rem;color:var(--t3);padding:6px">No roles — add roles to enable action assignment in playbooks.</p>':''}</div></div></div>`).join('')}
${D.teams.length===0?`<div class="empty">${sv(IC.us,32,'var(--t4)')}<p style="font-size:.75rem;margin-top:6px">No teams yet. Add a team to get started.</p></div>`:''}`;};

function toggleRP(tid,rid,pi){const r=D.teams.find(t=>t.id===tid)?.roles.find(r=>r.id===rid);if(!r)return;r.phases.includes(pi)?r.phases=r.phases.filter(p=>p!==pi):r.phases.push(pi);persist();V.teams()}
function toggleRC(tid,rid,cap){const r=D.teams.find(t=>t.id===tid)?.roles.find(r=>r.id===rid);if(!r)return;r.caps.includes(cap)?r.caps=r.caps.filter(c=>c!==cap):r.caps.push(cap);persist();V.teams()}
function tmModal(eid){const t=eid?D.teams.find(x=>x.id===eid):null;oModal(`<h2>${t?'Edit':'Add'} Team</h2><div class="fr"><div class="lbl">Name</div><input class="inp" id="m-tn" value="${t?.name||''}"></div><div class="fr"><div class="lbl">Description</div><input class="inp" id="m-td" value="${t?.desc||''}"></div><div class="impact-note">${sv(IC.sh,12,'var(--ac)')} Team roles and their phase/capability assignments directly control playbook action generation.</div><div class="fc g2 mt3"><button class="btn btn-p" onclick="saveTm('${eid||''}')">${sv(IC.sv2,12)} ${t?'Update':'Create'}</button><button class="btn btn-s" onclick="cModal()">Cancel</button></div>`)}
function saveTm(eid){const n=document.getElementById('m-tn').value.trim(),d=document.getElementById('m-td').value.trim();if(!n)return;if(eid){const t=D.teams.find(x=>x.id===eid);if(t){t.name=n;t.desc=d}}else D.teams.push({id:uid(),name:n,desc:d,roles:[]});cModal();persist();toast(eid?'Team updated':'Team created');V.teams()}

function rlModal(tid,rid){const t=D.teams.find(x=>x.id===tid);const r=rid?t?.roles.find(x=>x.id===rid):null;const rPhases=r?.phases||[];const rCaps=r?.caps||[];
oModal(`<h2>${r?'Edit':'Add'} Role — ${t?.name||''}</h2>
<div class="fr"><div class="lbl">Title</div><input class="inp" id="m-rt" value="${r?.title||''}"></div>
<div class="fr"><div class="lbl">Responsibilities</div><textarea class="inp" id="m-rr" style="min-height:50px">${r?.resp||''}</textarea><div class="hint">Describe what this role does — fed to AI for context-specific actions.</div></div>
<div class="fr"><div class="lbl">Active In Phases <span style="font-weight:400;color:var(--t4)">— determines which playbook phases this role appears in</span></div><div class="phase-assign" id="m-rp">${getPH().map((_,i)=>`<span class="nt nt-${i}${rPhases.includes(i)?'':' off'}" style="cursor:pointer" onclick="this.classList.toggle('off');this.dataset.on=this.classList.contains('off')?'':'1'" data-on="${rPhases.includes(i)?'1':''}" data-pi="${i}">${getPH()[i].name}</span>`).join('')}</div></div>
<div class="fr"><div class="lbl">Capabilities <span style="font-weight:400;color:var(--t4)">— matched to action verbs (triage, isolate, patch, etc.)</span></div><div id="m-rc" style="display:flex;flex-wrap:wrap;gap:2px">${CAPS.map(c=>`<span class="cap cap-sel${rCaps.includes(c)?' cap-active':' off'}" onclick="this.classList.toggle('cap-active');this.classList.toggle('off')" data-cap="${c}">${c}</span>`).join('')}</div></div>
<div class="impact-note">${sv(IC.sh,12,'var(--ac)')} Phases + capabilities = which playbook actions this role is assigned to. More capabilities = more actions.</div>
<div class="fc g2 mt3"><button class="btn btn-p" onclick="saveRl('${tid}','${rid||''}')">${sv(IC.sv2,12)} ${r?'Update':'Add'}</button><button class="btn btn-s" onclick="cModal()">Cancel</button></div>`)}
function saveRl(tid,rid){const ti=document.getElementById('m-rt').value.trim(),re=document.getElementById('m-rr').value.trim();if(!ti)return;const phases=[...document.querySelectorAll('#m-rp .nt')].filter(n=>n.dataset.on==='1'||!n.classList.contains('off')).map(n=>+n.dataset.pi);const caps=[...document.querySelectorAll('#m-rc .cap-active')].map(n=>n.dataset.cap);const t=D.teams.find(x=>x.id===tid);if(!t)return;if(rid){const r=t.roles.find(x=>x.id===rid);if(r){r.title=ti;r.resp=re;r.phases=phases;r.caps=caps}}else t.roles.push({id:uid(),title:ti,resp:re,phases,caps});cModal();persist();toast(rid?'Role updated':'Role added');V.teams()}

function toggleTPhase(id,pi){const t=D.tools.find(x=>x.id===id);if(!t)return;t.phases.includes(pi)?t.phases=t.phases.filter(p=>p!==pi):t.phases.push(pi);persist();V.tools()}
function toggleTCap(id,c){const t=D.tools.find(x=>x.id===id);if(!t)return;t.caps.includes(c)?t.caps=t.caps.filter(x=>x!==c):t.caps.push(c);persist();V.tools()}
function tlModal(eid){const t=eid?D.tools.find(x=>x.id===eid):null;oModal(`<h2>${t?'Edit':'Add'} Tool</h2><div class="fr"><div class="lbl">Name</div><input class="inp" id="m-tln" value="${t?.name||''}"></div><div class="fr"><div class="lbl">Category</div><input class="inp" id="m-tlc" value="${t?.cat||''}"></div><div class="fr"><div class="lbl">Description</div><textarea class="inp" id="m-tld" style="min-height:40px">${t?.desc||''}</textarea><div class="hint">Be specific — this guides AI: "isolates endpoints" is better than "endpoint tool".</div></div><div class="impact-note">${sv(IC.sh,12,'var(--ac)')} Phase mapping + capabilities determine which playbook phases reference this tool and how.</div><div class="fc g2 mt3"><button class="btn btn-p" onclick="saveTl('${eid||''}')">${sv(IC.sv2,12)} ${t?'Update':'Create'}</button><button class="btn btn-s" onclick="cModal()">Cancel</button></div>`)}
function saveTl(eid){const n=document.getElementById('m-tln').value.trim(),c=document.getElementById('m-tlc').value.trim(),d=document.getElementById('m-tld').value.trim();if(!n)return;if(eid){const t=D.tools.find(x=>x.id===eid);if(t){t.name=n;t.cat=c;t.desc=d}}else D.tools.push({id:uid(),name:n,cat:c,desc:d,phases:[],caps:[]});cModal();persist();toast(eid?'Tool updated':'Tool created');V.tools()}

// GENERATE
V.generate=()=>{
const cov=coverage(),g=gaps();
const toolMatrix=D.tools.map(t=>({name:t.name,phases:getPH().map((_,i)=>t.phases.includes(i))}));
const roleMatrix=allRoles().map(r=>({name:`${r.title} (${r.team})`,phases:getPH().map((_,i)=>r.phases.includes(i))}));

document.getElementById('pg-generate').innerHTML=`
<h1 class="pt">${sv(IC.sh,22,'var(--ac)')}Generate Playbook</h1>
<p class="ps">AI generates role-specific, tool-aware actions based on the coverage matrix below. Edit teams/tools to change what appears in playbooks.</p>

<div class="card" style="padding:14px;margin-bottom:14px"><div class="fb"><div><div class="lbl" style="margin:0">Framework</div><div style="font-size:.95rem;font-weight:600;margin-top:2px">${getFW().name} <span style="font-size:.88rem;color:var(--t3);font-weight:400">(${getPH().length} phases)</span></div></div><button class="btn btn-s btn-sm" onclick="fwModal()">${sv(IC.ed,11)} Change</button></div><div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:8px">${getPH().map((p,i)=>`<span class="nt nt-${i%6}" style="cursor:default">${p.emoji} ${p.name}</span>`).join('')}</div></div>

<div class="card cov-section mb3">
  <div class="cov-header" onclick="document.getElementById('cov-body').classList.toggle('open')">
    <h3>${sv('<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>',13,'var(--ac)')} Phase Coverage Matrix <span style="font-size:.88rem;color:var(--t3);font-weight:400">${g.length?`⚠ ${g.length} gap${g.length>1?'s':''}`:' ✓ Full coverage'}</span></h3>
    <span style="font-size:.85rem;color:var(--t3)">click to expand</span>
  </div>
  <div class="cov-body" id="cov-body">
    <div class="lbl mb2 mt2">Tool → Phase Mapping</div>
    <table class="matrix"><tr><th>Tool</th>${getPH().map(p=>`<th class="matrix-header-cell">${p.emoji} ${p.name}</th>`).join('')}</tr>
    ${toolMatrix.map(t=>`<tr><td class="name">${t.name}</td>${t.phases.map(on=>`<td><div class="dot ${on?'dot-on':'dot-off'}">${on?'✓':'−'}</div></td>`).join('')}</tr>`).join('')}
    <tr style="border-top:2px solid var(--brd)"><td style="font-weight:600;color:var(--t3);font-size:.85rem">TOTAL</td>${getPH().map((_,i)=>{const c=cov[i].tools.length;return`<td><div class="dot ${c?'dot-on':'dot-warn'}">${c}</div></td>`}).join('')}</tr></table>

    <div class="lbl mb2 mt3">Role → Phase Assignment</div>
    <table class="matrix"><tr><th>Role</th>${getPH().map(p=>`<th class="matrix-header-cell">${p.emoji} ${p.name}</th>`).join('')}</tr>
    ${roleMatrix.map(r=>`<tr><td class="name">${r.name}</td>${r.phases.map(on=>`<td><div class="dot ${on?'dot-on':'dot-off'}">${on?'✓':'−'}</div></td>`).join('')}</tr>`).join('')}
    <tr style="border-top:2px solid var(--brd)"><td style="font-weight:600;color:var(--t3);font-size:.85rem">TOTAL</td>${getPH().map((_,i)=>{const c=cov[i].roles.length;return`<td><div class="dot ${c?'dot-on':'dot-warn'}">${c}</div></td>`}).join('')}</tr></table>

    ${g.length?`<div class="cov-warn">${sv(IC.wn,12,'var(--amb)')} ${g.map(x=>`<b>${x.phase.name}</b>: missing ${[x.noTools?'tools':null,x.noRoles?'roles':null].filter(Boolean).join(' & ')}`).join(' · ')} — <span style="cursor:pointer;text-decoration:underline" onclick="go('${g[0].noTools?'tools':'teams'}')">fix now</span></div>`:`<div class="cov-ok">${sv(IC.ck,12,'var(--grn)')} All 6 phases have both tools and roles assigned. Full coverage.</div>`}
  </div>
</div>

<div class="lbl mb2">Quick Start — click a scenario template</div>
<div class="eg">${EX.map((e,i)=>`<div class="ec" onclick="fillEx(${i})"><h4>${e.t}</h4><p>${e.d}</p></div>`).join('')}</div>

<div class="card" style="padding:20px">
  <div class="fr"><div class="lbl">Scenario Title</div><input class="inp" id="gen-t" placeholder="e.g. Ransomware on File Shares"></div>
  <div class="fr"><div class="lbl">Incident Description</div><textarea class="inp" id="gen-d" style="min-height:100px" placeholder="Describe the incident in plain English. The AI maps this against your tool inventory, role capabilities, and phase assignments to generate targeted actions."></textarea><div class="hint">Mention data breach, PII, supply chain etc. to trigger InfoSec escalation.</div></div>
  <div class="fr"><div class="lbl">Severity</div><div class="sevs">${['low','medium','high','critical'].map(s=>`<div class="sev${D.sev===s?' on':''}" data-s="${s}" onclick="setSev('${s}')">${s[0].toUpperCase()+s.slice(1)}</div>`).join('')}</div></div>
  <div id="gen-prg" style="display:none"></div>
  <button class="genb" id="gen-btn" onclick="genPB()">${sv(IC.bo,17)} Generate ${getFW().short} Playbook</button>
</div>`;
};

function fillEx(i){document.getElementById('gen-t').value=EX[i].t;document.getElementById('gen-d').value=EX[i].d;setSev(EX[i].s)}
function setSev(s){D.sev=s;document.querySelectorAll('.sev').forEach(b=>b.classList.toggle('on',b.dataset.s===s))}

// ===== GENERATION ENGINE =====
async function genPB(){
const title=document.getElementById('gen-t').value.trim(),desc=document.getElementById('gen-d').value.trim();
if(!title||!desc){toast('Need title + description',sv(IC.wn,13,'var(--amb)'));return}
const btn=document.getElementById('gen-btn'),prg=document.getElementById('gen-prg');
btn.disabled=true;btn.innerHTML='<span class="spinner spinw"></span> Generating...';

const trig=IS_KW.filter(k=>desc.toLowerCase().includes(k));
const hasIS=trig.length>0;
const cov=coverage();

const toolCtx=D.tools.map(t=>`- ${t.name} (${t.cat}): ${t.desc}. Phases: [${t.phases.map(i=>getPH()[i]?.name||'?').join(', ')||'NONE'}]. Capabilities: [${t.caps.join(', ')||'none'}]`).join('\n');
const roleCtx=allRoles().map(r=>`- ${r.title} (${r.team}): ${r.resp}. Phases: [${r.phases.map(i=>getPH()[i]?.name||'?').join(', ')||'NONE'}]. Capabilities: [${r.caps.join(', ')||'none'}]`).join('\n');
const covCtx=getPH().map((p,i)=>`${p.name}: Tools=[${cov[i].tools.map(t=>t.name).join(', ')||'NONE'}], Roles=[${cov[i].roles.map(r=>r.title).join(', ')||'NONE'}]`).join('\n');
const fw=getFW();
const phKeys=fw.phKeys;
const phJsonObj='{\"phases\":{'+phKeys.map(k=>`\"${k}\":{\"actions\":[\"[Role] specific action...\"],\"infosec_actions\":[]}`).join(',')+'}}';

const sys=`${fw.prompt}

CRITICAL RULES — ENFORCE STRICTLY:
1. For each phase, ONLY use tools that are mapped to that phase (see COVERAGE below)
2. For each phase, ONLY assign actions to roles that are assigned to that phase
3. Each action MUST start with [Role Title] and reference tools by exact name
4. Match actions to role capabilities — if a role has "Isolate" capability, assign isolation tasks to them
5. Make actions SPECIFIC to this scenario, not generic boilerplate
6. If a phase has no tools or no roles mapped, note the gap and assign to nearest available role
${hasIS?`\n7. INFOSEC ESCALATION triggered by: ${trig.join(', ')}. Add infosec_actions for phases where InfoSec roles are assigned.`:''}

FRAMEWORK PHASES: ${getPH().map(p=>p.name).join(' → ')}

TOOL INVENTORY:
${toolCtx}

ROLE INVENTORY:
${roleCtx}

PHASE COVERAGE (this is authoritative — do not contradict):
${covCtx}

Respond ONLY with JSON (no markdown, no backticks, no prose):
${phJsonObj}
4-6 actions per phase. infosec_actions only where InfoSec roles are assigned.`;

prg.style.display='block';
prg.innerHTML=`<div class="prg"><div class="pl"><span class="spinner"></span> Analysing scenario against ${D.tools.length} tools × ${allRoles().length} roles...</div><div class="pp">Building coverage-aware response actions</div><div class="pbar"><div class="pfill" id="pbar" style="width:8%"></div></div></div>`;

let aiData=null;const bar=()=>document.getElementById('pbar');
try{
  setTimeout(()=>{if(bar())bar().style.width='20%'},300);
  setTimeout(()=>{if(bar())bar().style.width='40%';const p=prg.querySelector('.pp');if(p)p.textContent='Matching role capabilities to phase requirements...'},1200);
  setTimeout(()=>{if(bar())bar().style.width='60%'},2000);
  setTimeout(()=>{if(bar())bar().style.width='75%';const p=prg.querySelector('.pp');if(p)p.textContent='Assigning tools to scenario-specific actions...'},2800);

  const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:sys,messages:[{role:'user',content:`Scenario: "${title}"\nDescription: ${desc}\nSeverity: ${D.sev}`}]})});
  if(bar())bar().style.width='90%';
  const data=await res.json();
  const txt=data.content?.map(c=>c.text||'').join('')||'';
  aiData=JSON.parse(txt.replace(/```json|```/g,'').trim());
  if(bar())bar().style.width='100%';
}catch(e){
  console.warn('AI fallback:',e);
  if(bar())bar().style.width='100%';
  const p=prg.querySelector('.pp');if(p)p.textContent='Using coverage-aware template engine...';
}
await new Promise(r=>setTimeout(r,350));

const isTeam=D.teams.find(t=>t.name.toLowerCase().includes('infosec'));
const phases=getPH().map((pd,pi)=>{
  const pTools=cov[pi].tools;
  const pRoles=cov[pi].roles;
  const isReq=hasIS&&fw.isPhases.includes(pi);
  const aTeams=[];
  D.teams.forEach(t=>{
    const teamRoles=t.roles.filter(r=>r.phases.includes(pi));
    if(teamRoles.length)aTeams.push({...t,roles:teamRoles});
  });

  let actions,isActions=[];
  const phKey=phKeys[pi];
  if(aiData?.phases?.[phKey]){
    actions=aiData.phases[phKey].actions||[];
    isActions=aiData.phases[phKey].infosec_actions||[];
  }else{
    actions=buildActions(pi,pTools,pRoles,hasIS,trig);
    isActions=isReq?buildISActions(pi,trig):[];
  }
  return{idx:pi,name:pd.name,emoji:pd.emoji,tools:pTools.map(t=>({id:t.id,name:t.name,cat:t.cat})),teams:aTeams,actions,isReq,isActions};
});

// Template engine
function buildActions(pi,pTools,pRoles,hasIS,trig){
  const ts=pTools.map(t=>t.name).join(', ')||'available tools';
  const findRole=(cap)=>{const r=pRoles.find(r=>r.caps.includes(cap));return r?r.title:pRoles[0]?.title||'Assigned analyst'};
  const acts=[];
  const capMap={
    0:[['Monitor',`Verify ${ts} agents are deployed and reporting across all endpoints`],['Patch',`Confirm endpoint patching is current and vulnerability scan schedule is active`],['Coordinate',`Review IR team contacts, comms channels, and escalation paths`],['Scan',`Run pre-incident posture check using ${ts}`],['Document',`Validate runbook documentation and evidence collection procedures`]],
    1:[['Monitor',`Monitor ${ts} alerts for indicators of compromise`],['Correlate',`Correlate events across ${ts} to confirm scope and blast radius`],['Analyse',`Determine attack vector, affected systems, and lateral movement paths`],['Triage',`Assign incident severity and document initial findings in tracker`],['Hunt',`Conduct targeted threat hunt across ${ts} for related IoCs`]],
    2:[['Isolate',`Use ${ts} to isolate affected endpoints from the network`],['Block',`Block malicious IPs, domains, and hashes across proxy and firewall`],['Contain',`Disable compromised accounts and revoke active sessions`],['Isolate',`Implement network segmentation to prevent lateral spread`],['Investigate',`Preserve forensic evidence and memory dumps before remediation`]],
    3:[['Eradicate',`Deploy ${ts} to remove all malicious artefacts from affected systems`],['Remediate',`Reset credentials for all compromised and potentially compromised accounts`],['Patch',`Patch the exploited vulnerability across all affected and similar systems`],['Scan',`Full environment scan using ${ts} for persistence mechanisms`],['Eradicate',`Verify complete removal via secondary scan and manual checks`]],
    4:[['Restore',`Restore affected systems from verified clean backups`],['Monitor',`Monitor restored systems via ${ts} for re-infection indicators`],['Restore',`Gradually return systems to production with enhanced logging`],['Coordinate',`Validate business operations are functioning normally`],['Scan',`Confirm all security controls and agents are fully operational`]],
    5:[['Coordinate',`Conduct post-incident review within 5 business days`],['Document',`Document lessons learned, full timeline, and response effectiveness`],['Report',`Update playbooks and detection rules based on findings`],['Audit',`Identify gaps in detection, tooling, and process`],['Report',`Review ${ts} configurations for detection improvements`]],
  };
  (capMap[pi]||[]).forEach(([cap,action])=>{
    const role=findRole(cap);
    acts.push(`[${role}] ${action}`);
  });
  if(hasIS&&pi===1)acts.push(`[${findRole('Escalate')}] ESCALATION: Assess data breach — notify InfoSec immediately if confirmed`);
  return acts;
}

function buildISActions(pi,trig){
  const ts=trig.slice(0,3).join(', ');
  const mgr=allRoles().find(r=>r.caps.includes('Notify')&&r.team.toLowerCase().includes('infosec'))?.title||'InfoSec Manager';
  const analyst=allRoles().find(r=>r.caps.includes('Audit')&&r.team.toLowerCase().includes('infosec'))?.title||'InfoSec Analyst';
  const m={
    1:[[mgr,`Notified — triggered by: ${ts}`],[mgr,`Assess regulatory notification requirements (ICO, GDPR)`],[analyst,`Begin data impact assessment — identify affected data types`]],
    2:[[analyst,`Oversee evidence preservation for regulatory inquiry`],[mgr,`Coordinate with Legal on breach notification timeline`],[analyst,`Document chain of custody for all forensic evidence`]],
    4:[[analyst,`Validate data integrity post-recovery`],[mgr,`Confirm no ongoing data exposure channels remain`]],
    5:[[mgr,`Lead regulatory notification if required (72-hr ICO window)`],[analyst,`Prepare breach report: scope, impact, remediation`],[mgr,`Update DPIA based on incident findings`],[analyst,`Review data handling procedures to prevent recurrence`]],
  };
  return(m[pi]||[]).map(([r,a])=>`[${r}] ${a}`);
}

// Universal download helper — works inside iframes
function dlFile(blob, filename) {
  try {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    // Cleanup after a delay to ensure download starts
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 250);
  } catch(e) {
    // Fallback: send to parent frame
    try {
      const reader = new FileReader();
      reader.onload = function() {
        window.parent.postMessage({ type: 'DOWNLOAD_FILE', dataUrl: reader.result, filename: filename }, '*');
      };
      reader.readAsDataURL(blob);
    } catch(e2) { console.error('Download failed:', e2); }
  }
}

function exportMD(id){
const pb=D.playbooks.find(p=>p.id===id);if(!pb)return;
let md=`# ${pb.title}\n\n`;
md+=`**Framework:** ${FRAMEWORKS[pb.framework||'nist']?.name||'NIST SP 800-61'} | **Status:** ${pb.status} | **Severity:** ${pb.scenario.s} | **Date:** ${pb.date}${pb.ai?' | **AI Generated**':''}\n\n`;
md+=`## Scenario\n\n**${pb.scenario.t}**\n\n${pb.scenario.d}\n\n`;
if(pb.trig?.length)md+=`**InfoSec Triggers:** ${pb.trig.join(', ')}\n\n`;
md+=`---\n\n## ${FRAMEWORKS[pb.framework||'nist']?.name||'NIST'} Phases\n\n`;
pb.phases.forEach(ph=>{
  md+=`### ${ph.emoji} Phase ${ph.idx+1}: ${ph.name}\n\n`;
  md+=`**Tools:** ${ph.tools.map(t=>t.name).join(', ')||'None mapped'}\n\n`;
  md+=`**Teams:** ${ph.teams.map(t=>t.name).join(', ')||'None assigned'}\n\n`;
  md+=`**Actions:**\n\n`;
  ph.actions.forEach((a,i)=>md+=`${i+1}. ${a}\n`);
  if(ph.isReq&&ph.isActions.length){
    md+=`\n**InfoSec Escalation:**\n\n`;
    ph.isActions.forEach(a=>md+=`- 🔴 ${a}\n`);
  }
  md+='\n';
});
const blob=new Blob([md],{type:'text/markdown'});
dlFile(blob, `${pb.title.replace(/[^a-zA-Z0-9]/g,'-')}.md`);
toast('Exported as Markdown');
}
